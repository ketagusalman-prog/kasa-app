<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kişisel Panel</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {  
    font-family: Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

.container {
    max-width:800px;
    margin:auto;
}

.kart {
    background:#2a2a3d;
    padding:15px;
    margin:20px;
    border-radius:10px;
    box-shadow:0 0 10px #000;
}

button {
    padding:10px;
    margin:10px;
    border-radius:8px;
    border:none;
    background:#4CAF50;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>👤 Kişisel Panel</h2>

<button onclick="window.location.href='index.html'">⬅️ Geri</button>

<input type="file" id="excelInput">

<div id="sonuc"></div>

</div>

<script>

let excelData = [];

/* 🔥 kullanıcı */
let kullanici = (localStorage.getItem("kullanici") || "").toLowerCase().trim();

/* 📥 EXCEL OKU */
document.getElementById("excelInput").addEventListener("change", function(e){

    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(e){
        let data = new Uint8Array(e.target.result);
        let workbook = XLSX.read(data, {type: 'array'});

        let sheet = workbook.Sheets[workbook.SheetNames[0]];
        excelData = XLSX.utils.sheet_to_json(sheet);

        /* 🔥 KAYDET */
        localStorage.setItem("excelData", JSON.stringify(excelData));

        goster();
    }

    reader.readAsArrayBuffer(file);
});

/* 🔥 SAYFA AÇILINCA YÜKLE */
window.onload = function(){
    let kayit = localStorage.getItem("excelData");
    if(kayit){
        excelData = JSON.parse(kayit);
        goster();
    }
}

/* 📊 SADECE KENDİNİ GÖSTER */
function goster(){

    let div = document.getElementById("sonuc");
    div.innerHTML = "";

    let kisi = excelData.find(x => 
        (x.isim || "").toLowerCase().trim() === kullanici
    );

    if(!kisi){
        div.innerHTML = "Kayıt bulunamadı";
        return;
    }

    let d = document.createElement("div");
    d.className = "kart";

    d.innerHTML = `
        <h3>${kisi.isim}</h3>
        Fiş: ${kisi.fis || "-"}<br>
        Kasa: ${kisi.kasa || "-"}<br>
        Prim: ${kisi.prim || "-"}<br>
        Departman: ${kisi.departman || "-"}<br>
        Sicil: ${kisi.sicil || "-"}<br>
        Telefon: ${kisi.telefon || "-"}
    `;

    div.appendChild(d);
}

</script>

</body>
</html>
