<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Excel Yükleme</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

.container {
    max-width:600px;
    margin:auto;
}

button {
    padding:10px;
    margin:10px;
    border-radius:8px;
    border:none;
    background:#4CAF50;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Excel Yükleme Paneli</h2>

<input type="file" id="excelInput">
<br>
<button onclick="kaydet()">🔥 Firebase'e Kaydet</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let excelData = [];

/* 📥 EXCEL OKU */
document.getElementById("excelInput").addEventListener("change", function(e){

    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(evt){
        let data = new Uint8Array(evt.target.result);
        let workbook = XLSX.read(data, {type: 'array'});

        let sheet = workbook.Sheets[workbook.SheetNames[0]];
        excelData = XLSX.utils.sheet_to_json(sheet);

        alert("Excel yüklendi ✔");
        console.log(excelData);
    }

    reader.readAsArrayBuffer(file);
});

/* 🔥 FIREBASE KAYDET */
window.kaydet = async function(){

    if(excelData.length === 0){
        alert("Excel yükle!");
        return;
    }

    await setDoc(doc(db,"kasa","excel"), {liste: excelData});

    alert("Firebase'e kaydedildi 🚀");
}

</script>

</body>
</html>
