<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kişisel Panel</title>

<style>
body {
    font-family: Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

.container {
    max-width:600px;
    margin:auto;
}

.kart {
    background:#2a2a3d;
    padding:15px;
    margin:10px;
    border-radius:10px;
}

/* 🔥 YENİ */
.yeniMesaj {
    background:#8B0000;
    animation: yanip 1s infinite;
}

@keyframes yanip {
    0% {box-shadow:0 0 5px red;}
    50% {box-shadow:0 0 20px red;}
    100% {box-shadow:0 0 5px red;}
}
</style>
</head>

<body>

<div class="container">

<h2>👤 Kişisel Panel</h2>

<div id="bilgi"></div>

<!-- 🔥 YENİ -->
<div id="mesajAlani"></div>

<h3>📜 Mesaj Geçmişi</h3>
<div id="gecmis"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 KULLANICI */
let kullanici = (localStorage.getItem("kullanici") || "").toLowerCase();

/* 📊 EXCEL VERİ */
const ref = doc(db, "kasa", "excel");

onSnapshot(ref, (snap)=>{

    let data = snap.exists() ? snap.data().liste : [];

    let kisi = data.find(x =>
        (x.isim || "").toLowerCase() === kullanici
    );

    let div = document.getElementById("bilgi");

    if(!kisi){
        div.innerHTML = "Veri bulunamadı ❌";
        return;
    }

    div.innerHTML = `
        <div class="kart">
            <h3>${kisi.isim}</h3>
            <p>Departman: ${kisi.departman || "-"}</p>
            <p>Sicil: ${kisi.sicil || "-"}</p>
            <p>Telefon: ${kisi.telefon || "-"}</p>
            <p>Fiş Sayısı: ${kisi.fis || "-"}</p>
        </div>
    `;
});

/* 🔥 MESAJ SİSTEMİ */

// aktif mesaj
const mesajRef = doc(db, "mesajlar", kullanici);

onSnapshot(mesajRef, async (snap)=>{

    if(!snap.exists()) return;

    let m = snap.data();

    let div = document.getElementById("mesajAlani");

    // 🔔 popup
    alert("📩 Yeni mesajın var!");

    div.innerHTML = `
        <div class="kart ${!m.okundu ? "yeniMesaj":""}">
            <h3>📩 Mesaj</h3>
            <p>${m.text}</p>
            <button onclick="okunduYap()">Okundu</button>
        </div>
    `;

});

/* ✅ OKUNDU */
window.okunduYap = async function(){

    const mesajRef = doc(db, "mesajlar", kullanici);

    let snap = await (await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js")).getDoc(mesajRef);

    if(!snap.exists()) return;

    let m = snap.data();

    // geçmişe ekle
    const gecmisRef = doc(db, "mesajGecmis", kullanici);

    let eski = [];

    let gSnap = await (await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js")).getDoc(gecmisRef);

    if(gSnap.exists()) eski = gSnap.data().liste || [];

    eski.push({
        text: m.text,
        tarih: new Date().toLocaleString()
    });

    await setDoc(gecmisRef, {liste: eski});

    // mesajı okundu yap
    await setDoc(mesajRef, {
        text: m.text,
        okundu: true
    });

    document.getElementById("mesajAlani").innerHTML = "";
}

/* 📜 GEÇMİŞ */
const gecmisRef = doc(db, "mesajGecmis", kullanici);

onSnapshot(gecmisRef, (snap)=>{

    if(!snap.exists()) return;

    let liste = snap.data().liste || [];

    let div = document.getElementById("gecmis");
    div.innerHTML = "";

    liste.reverse().forEach(m => {

        let d = document.createElement("div");
        d.className="kart";

        d.innerHTML = `
            <p>${m.text}</p>
            <small>${m.tarih}</small>
        `;

        div.appendChild(d);
    });

});

</script>

</body>
</html>
