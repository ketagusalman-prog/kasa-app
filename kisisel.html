<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş Paneli</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    background: #0f172a;
    font-family: "Segoe UI";
    display: flex;
    justify-content: center;
}

/* telefon görünüm */
.container {
    width: 360px;
    min-height: 100vh;
    background: #020617;
    border-radius: 25px;
    padding: 15px;
    color: white;
}

/* input */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

/* buton */
button {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    color: white;
    font-weight: bold;
}

/* kart */
.kart {
    background: #1e293b;
    padding: 20px;
    border-radius: 20px;
    margin-top: 15px;
}

.kart p {
    display: flex;
    justify-content: space-between;
}

.high { color: #22c55e; }
.low { color: #ef4444; }

/* mesaj */
.alert {
    background: red;
    padding: 6px;
    border-radius: 8px;
    animation: blink 1s infinite;
    text-align: center;
    margin-bottom: 10px;
}

@keyframes blink {
    0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}
}
</style>
</head>

<body>

<div class="container">

<div id="login">
    <h2>🔐 Giriş</h2>
    <input type="text" id="username" placeholder="Kullanıcı adı">
    <input type="password" id="password" placeholder="Şifre">
    <button onclick="login()">Giriş Yap</button>
</div>

<div id="panel" style="display:none;">
    <div id="alertBox" class="alert" style="display:none;">Yeni Mesaj</div>
    <div id="content"></div>
    <canvas id="grafik"></canvas>
</div>

</div>

<script>

// kullanıcılar (örnek)
const users = [
    { username: "admin", password: "1234", role: "admin" },
    { username: "ahmet", password: "111", role: "user" },
    { username: "mehmet", password: "222", role: "user" }
];

// veri
const data = [
    { isim:"ahmet", departman:"Kasa", sicil:123, fis:50, satirSayisi:200, fisBasiSure:2, kpuan:80 },
    { isim:"mehmet", departman:"Reyon", sicil:124, fis:30, satirSayisi:120, fisBasiSure:3, kpuan:60 }
];

// login
function login(){
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;

    const user = users.find(x => x.username===u && x.password===p);

    if(!user) return alert("Hatalı giriş");

    document.getElementById("login").style.display="none";
    document.getElementById("panel").style.display="block";

    render(user);
}

// render
function render(user){
    let html = "";

    const avg = data.reduce((a,b)=>a+b.kpuan,0)/data.length;

    if(user.role==="admin"){
        data.forEach(kisi=>{
            html += card(kisi, avg);
        });
    } else {
        const kisi = data.find(x=>x.isim===user.username);
        html = card(kisi, avg);
    }

    document.getElementById("content").innerHTML = html;

    drawChart(avg);
}

// kart
function card(kisi, avg){
    return `
    <div class="kart">
        <h3>${kisi.isim}</h3>
        <p>🏢 Departman <b>${kisi.departman}</b></p>
        <p>🆔 Sicil <b>${kisi.sicil}</b></p>
        <p>🧾 Fiş <b>${kisi.fis}</b></p>
        <p>📊 Satır <b>${kisi.satirSayisi}</b></p>
        <p>⏱️ Süre <b>${kisi.fisBasiSure}</b></p>
        <p>⭐ Kpuan <b class="${kisi.kpuan>=avg?'high':'low'}">${kisi.kpuan}</b></p>
    </div>`;
}

// grafik
function drawChart(avg){
    new Chart(document.getElementById("grafik"), {
        type:"bar",
        data:{
            labels:["Ortalama"],
            datasets:[{data:[avg]}]
        }
    });
}

// mesaj efekti
setInterval(()=>{
    const box = document.getElementById("alertBox");
    box.style.display="block";
    setTimeout(()=>box.style.display="none",3000);
},15000);

</script>

</body>
</html>
