<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kişisel Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    background: #0f172a;
    font-family: "Segoe UI";
    display: flex;
    justify-content: center;
}

/* telefon görünümü */
.container {
    width: 360px;
    min-height: 100vh;
    background: #020617;
    border-radius: 25px;
    padding: 15px;
    box-shadow: 0 0 40px rgba(0,0,0,0.7);
}

/* üst bar */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
}

/* mesaj uyarı */
.alert {
    background: red;
    padding: 6px 12px;
    border-radius: 10px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% {opacity:1;}
    50% {opacity:0.2;}
    100% {opacity:1;}
}

input {
    width: 100%;
    padding: 10px;
    margin: 15px 0;
    border-radius: 10px;
    border: none;
}

/* kart */
.kart {
    background: #1e293b;
    padding: 20px;
    border-radius: 20px;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

.kart p {
    display: flex;
    justify-content: space-between;
    margin: 6px 0;
}

.high { color: #22c55e; }
.low { color: #ef4444; }

canvas {
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

    <div class="topbar">
        <h3>⚡ Panel</h3>
        <div id="alertBox" class="alert" style="display:none;">Yeni Mesaj</div>
    </div>

    <input type="text" id="myName" placeholder="İsmini yaz...">

    <div id="kart"></div>
    <canvas id="grafik"></canvas>

</div>

<script>

// GOOGLE SHEET LINK
const SHEET_URL = "BURAYA_LINK";

// mesaj animasyonu
setInterval(() => {
    const box = document.getElementById("alertBox");
    box.style.display = "block";
    setTimeout(() => box.style.display = "none", 3000);
}, 15000);

// veri çekme
async function loadData() {
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const rows = text.split("\n").map(r => r.split(","));
    const headers = rows[0];

    return rows.slice(1).map(row => {
        let obj = {};
        headers.forEach((h,i)=> obj[h.trim()] = row[i]);
        return obj;
    });
}

let allData = [];

loadData().then(d => allData = d);

// render
function render() {
    const name = document.getElementById("myName").value.toLowerCase();
    const kisi = allData.find(x => x.isim?.toLowerCase() === name);

    if (!kisi) return;

    const avg = allData.reduce((a,b)=>a+Number(b.kpuan||0),0)/allData.length;

    document.getElementById("kart").innerHTML = `
    <div class="kart">
        <h2>${kisi.isim}</h2>

        <p>🏢 Departman: <b>${kisi.departman || "-"}</b></p>
        <p>🆔 Sicil: <b>${kisi.sicil || "-"}</b></p>
        <p>🧾 Fiş Sayısı: <b>${kisi.fis || "-"}</b></p>
        <p>📊 Satır Sayısı: <b>${kisi.satirSayisi || "-"}</b></p>
        <p>⏱️ Fiş Başı Süre: <b>${kisi.fisBasiSure || "-"}</b></p>
        <p>⭐ Kpuan: <b class="${kisi.kpuan>=avg?'high':'low'}">${kisi.kpuan || "-"}</b></p>

        <p>📈 Ortalama: <b>${avg.toFixed(1)}</b></p>
    </div>
    `;

    drawChart(kisi, avg);
}

// grafik
function drawChart(kisi, avg){
    new Chart(document.getElementById('grafik'), {
        type: 'doughnut',
        data: {
            labels: ['Sen', 'Ortalama'],
            datasets: [{
                data: [Number(kisi.kpuan), avg]
            }]
        }
    });
}

document.getElementById("myName").addEventListener("input", render);

</script>

</body>
</html>
