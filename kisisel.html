<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kişisel Panel</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    background: #0f172a;
    font-family: "Segoe UI";
    display: flex;
    justify-content: center;
}

.container {
    width: 360px;
    min-height: 100vh;
    background: #020617;
    border-radius: 25px;
    padding: 15px;
    color: white;
}

.topbar {
    display: flex;
    justify-content: space-between;
}

.alert {
    background: red;
    padding: 6px 12px;
    border-radius: 10px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;}
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

button {
    padding:10px;
    border-radius:10px;
    border:none;
    background:#4CAF50;
    color:white;
}

.kart {
    background: #1e293b;
    padding: 20px;
    border-radius: 20px;
    margin-top: 10px;
}

.kart p {
    display: flex;
    justify-content: space-between;
}

.high { color: #22c55e; }
.low { color: #ef4444; }

.yeniMesaj { border-left:4px solid red; }

#sayac {
    background:red;
    padding:4px 8px;
    border-radius:50%;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
    <h3>⚡ Panel</h3>
    <div id="sayac"></div>
</div>

<!-- 🔥 İLK GİRİŞ -->
<div id="setup"></div>

<div id="kart"></div>
<canvas id="grafik"></canvas>

<h3>📩 Mesajlar</h3>

<button onclick="tumunuSil()">🧹 Tümünü Sil</button>
<button onclick="okunanlariSil()">✔ Okunanları Sil</button>

<div id="mesajAlani"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 KULLANICI */
let kullanici = (localStorage.getItem("kullanici") || "").toLowerCase();

/* 🔥 GOOGLE SHEETS */
const URL = "https://script.google.com/macros/s/AKfycbxODlNf0yl2oAtkd5oMw1ghWavKSOO8TmT81uAUN8Oiqbj8yzx81x7iRexwcAHo7ecv4g/exec";

let tumData = [];

/* 🔥 INIT */
init();

function init(){

    if(!kullanici){
        document.getElementById("setup").innerHTML = `
        <input id="nameInput" placeholder="İsmini bir kez yaz">
        <button onclick="saveUser()">Kaydet</button>`;
    } else {
        veriCek();
    }
}

/* 🔥 İLK KAYIT */
window.saveUser = function(){
    let val = document.getElementById("nameInput").value.toLowerCase().trim();
    if(!val) return alert("İsim gir");

    localStorage.setItem("kullanici", val);
    location.reload();
}

/* 🔥 VERİ ÇEK */
function veriCek(){

    fetch(URL)
    .then(res => res.json())
    .then(data => {

        tumData = data.filter(x => x.isim && x.isim.trim() !== "");

        render();
    });
}

/* 🔥 RENDER */
function render(){

    let kisi = tumData.find(x =>
        x.isim.toLowerCase().trim() === kullanici
    );

    if(!kisi){
        document.getElementById("kart").innerHTML = "Veri bulunamadı ❌";
        return;
    }

    let avg = tumData.reduce((a,b)=>a+Number(b.kpuan||0),0) / tumData.length;

    document.getElementById("kart").innerHTML = `
    <div class="kart">
        <h3>${kisi.isim}</h3>

        <p>🏢 Departman <b>${kisi.departman || "-"}</b></p>
        <p>🆔 Sicil <b>${kisi.sicil || "-"}</b></p>
        <p>🧾 Fiş <b>${kisi.fis || "-"}</b></p>
        <p>📊 Satır <b>${kisi.satirSayisi || "-"}</b></p>
        <p>⏱️ Süre <b>${kisi.fisBasiSure || "-"}</b></p>
        <p>⭐ Kpuan <b class="${kisi.kpuan>=avg?'high':'low'}">${kisi.kpuan || 0}</b></p>
    </div>`;

    drawChart(kisi, avg);
}

/* 🔥 GRAFİK */
function drawChart(kisi, avg){
    new Chart(document.getElementById("grafik"), {
        type:"doughnut",
        data:{
            labels:["Sen","Ortalama"],
            datasets:[{
                data:[kisi.kpuan || 0, avg]
            }]
        }
    });
}

/* 📩 MESAJ (DOKUNULMADI) */
const mesajRef = doc(db, "mesajlar", kullanici);

onSnapshot(mesajRef, (snap)=>{

    if(!snap.exists()) return;

    let data = snap.data().liste || [];

    let div = document.getElementById("mesajAlani");
    let sayac = document.getElementById("sayac");

    div.innerHTML = "";

    let okunmamis = 0;

    data.slice().reverse().forEach((m,index)=>{

        let realIndex = data.length - 1 - index;

        if(!m.okundu) okunmamis++;

        let d = document.createElement("div");
        d.className = "kart " + (!m.okundu ? "yeniMesaj" : "");

        d.innerHTML = `
            <p>${m.text}</p>
            <small>${new Date(m.tarih).toLocaleString()}</small><br>
            ${!m.okundu ? `<button onclick="okunduYap(${realIndex})">✔</button>` : ""}
            <button onclick="silMesaj(${realIndex})">🗑️</button>
        `;

        div.appendChild(d);
    });

    sayac.innerText = okunmamis > 0 ? okunmamis : "";
});

window.okunduYap = async function(i){
    let snap = await getDoc(mesajRef);
    let liste = snap.data().liste;
    liste[i].okundu = true;
    await setDoc(mesajRef,{liste});
}

window.silMesaj = async function(i){
    let snap = await getDoc(mesajRef);
    let liste = snap.data().liste;
    liste.splice(i,1);
    await setDoc(mesajRef,{liste});
}

window.tumunuSil = async function(){
    await setDoc(mesajRef,{liste:[]});
}

window.okunanlariSil = async function(){
    let snap = await getDoc(mesajRef);
    let liste = snap.data().liste.filter(x=>!x.okundu);
    await setDoc(mesajRef,{liste});
}

</script>

</body>
</html>
