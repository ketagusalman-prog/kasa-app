<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kişisel Panel</title>

<style>
body {
    font-family: Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

.container {
    max-width:600px;
    margin:auto;
}

.kart {
    background:#2a2a3d;
    padding:15px;
    margin:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>👤 Kişisel Panel</h2>

<div id="bilgi"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 GİRİŞ YAPAN KULLANICI */
let kullanici = (localStorage.getItem("kullanici") || "").toLowerCase();

const ref = doc(db, "kasa", "excel");

onSnapshot(ref, (snap)=>{

    let data = snap.exists() ? snap.data().liste : [];

    let kisi = data.find(x =>
        (x.isim || "").toLowerCase() === kullanici
    );

    let div = document.getElementById("bilgi");

    if(!kisi){
        div.innerHTML = "Veri bulunamadı ❌";
        return;
    }

    div.innerHTML = `
        <div class="kart">
            <h3>${kisi.isim}</h3>
            <p>Departman: ${kisi.departman || "-"}</p>
            <p>Sicil: ${kisi.sicil || "-"}</p>
            <p>Telefon: ${kisi.telefon || "-"}</p>
            <p>Fiş Sayısı: ${kisi.fis || "-"}</p>
        </div>
    `;
});

</script>

</body>
</html>
