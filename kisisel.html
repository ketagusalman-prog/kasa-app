<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kişisel Panel</title>

<style>
body {
    font-family: Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

.container {
    max-width:600px;
    margin:auto;
}

.kart {
    background:#2a2a3d;
    padding:15px;
    margin:10px;
    border-radius:10px;
}

.yeniMesaj {
    border-left:5px solid red;
}

.bildirim {
    position:fixed;
    top:10px;
    right:10px;
    background:#4CAF50;
    padding:10px 15px;
    border-radius:8px;
    display:none;
}

#sayac {
    background:red;
    padding:5px 10px;
    border-radius:50%;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>👤 Kişisel Panel <span id="sayac"></span></h2>

<div id="bilgi"></div>

<h3>📩 Mesajlar</h3>

<!-- 🔥 YENİ BUTONLAR -->
<div>
<button onclick="tumunuSil()">🧹 Tüm Mesajları Sil</button>
<button onclick="okunanlariSil()">✔ Okunmuşları Temizle</button>
</div>

<div id="mesajAlani"></div>

</div>

<div id="bildirim" class="bildirim">Yeni mesaj var!</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let kullanici = (localStorage.getItem("kullanici") || "").toLowerCase();

/* 📊 PERSONEL */
const ref = doc(db, "kasa", "excel");

onSnapshot(ref, (snap)=>{

    let data = snap.exists() ? snap.data().liste : [];

    let kisi = data.find(x =>
        (x.isim || "").toLowerCase() === kullanici
    );

    let div = document.getElementById("bilgi");

    if(!kisi){
        div.innerHTML = "Veri bulunamadı ❌";
        return;
    }

    div.innerHTML = `
        <div class="kart">
            <h3>${kisi.isim}</h3>
            <p>Departman: ${kisi.departman || "-"}</p>
            <p>Sicil: ${kisi.sicil || "-"}</p>
            <p>Telefon: ${kisi.telefon || "-"}</p>
            <p>Fiş Sayısı: ${kisi.fis || "-"}</p>
        </div>
    `;
});

/* 📩 MESAJ */
const mesajRef = doc(db, "mesajlar", kullanici);

onSnapshot(mesajRef, (snap)=>{

    if(!snap.exists()) return;

    let data = snap.data().liste || [];

    let div = document.getElementById("mesajAlani");
    let sayac = document.getElementById("sayac");

    div.innerHTML = "";

    let okunmamis = 0;

    data.slice().reverse().forEach((m,index)=>{

        let realIndex = data.length - 1 - index;

        if(!m.okundu) okunmamis++;

        let d = document.createElement("div");
        d.className = "kart " + (!m.okundu ? "yeniMesaj" : "");

        d.innerHTML = `
            <p>${m.text}</p>
            <small>${new Date(m.tarih).toLocaleString()}</small><br>
            ${!m.okundu ? `<button onclick="okunduYap(${realIndex})">✔ Okundu</button>` : ""}
            <button onclick="silMesaj(${realIndex})">🗑️ Sil</button>
        `;

        div.appendChild(d);
    });

    sayac.innerText = okunmamis > 0 ? okunmamis : "";

    if(okunmamis > 0){
        let b = document.getElementById("bildirim");
        b.style.display = "block";
        setTimeout(()=> b.style.display="none", 3000);
    }

});

/* ✔ OKUNDU */
window.okunduYap = async function(index){

    let snap = await getDoc(mesajRef);
    if(!snap.exists()) return;

    let liste = snap.data().liste || [];

    liste[index].okundu = true;

    await setDoc(mesajRef, {liste});
}

/* 🗑️ TEK SİL */
window.silMesaj = async function(index){

    let snap = await getDoc(mesajRef);
    if(!snap.exists()) return;

    let liste = snap.data().liste || [];

    let yeniListe = liste.filter((_, i) => i !== index);

    await setDoc(mesajRef, {liste: yeniListe});
}

/* 🔥 TÜMÜNÜ SİL */
window.tumunuSil = async function(){

    if(!confirm("Tüm mesajlar silinsin mi?")) return;

    await setDoc(mesajRef, {liste: []});
}

/* 🔥 SADECE OKUNMUŞLARI SİL */
window.okunanlariSil = async function(){

    let snap = await getDoc(mesajRef);
    if(!snap.exists()) return;

    let liste = snap.data().liste || [];

    let filtre = liste.filter(m => !m.okundu);

    await setDoc(mesajRef, {liste: filtre});
}

</script>

</body>
</html>
