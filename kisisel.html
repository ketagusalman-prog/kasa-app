<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kişisel Panel</title>

<style>
body {
    font-family: Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

.container {
    max-width:600px;
    margin:auto;
}

.kart {
    background:#2a2a3d;
    padding:15px;
    margin:10px;
    border-radius:10px;
}

.yeniMesaj { border-left:5px solid red; }

.pin { border:2px solid gold; }

.toast {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#333;
    padding:10px 15px;
    border-radius:8px;
    display:none;
}

#sayac {
    background:red;
    padding:5px 10px;
    border-radius:50%;
    font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>👤 Kişisel Panel <span id="sayac"></span></h2>

<div id="bilgi"></div>

<h3>📩 Mesajlar</h3>

<div>
<button onclick="tumunuSil()">🧹 Tüm Mesajları Sil</button>
<button onclick="okunanlariSil()">✔ Okunmuşları Temizle</button>
</div>

<div id="mesajAlani"></div>

</div>

<div id="toast" class="toast">Yeni mesaj geldi 🔔</div>

<!-- 🔊 SES -->
<audio id="ses" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let kullanici = (localStorage.getItem("kullanici") || "").toLowerCase();

/* 📊 PERSONEL */
const ref = doc(db, "kasa", "excel");

onSnapshot(ref, (snap)=>{
    let data = snap.exists() ? snap.data().liste : [];
    let kisi = data.find(x => (x.isim || "").toLowerCase() === kullanici);

    let div = document.getElementById("bilgi");

    if(!kisi){
        div.innerHTML = "Veri bulunamadı ❌";
        return;
    }

    div.innerHTML = `
        <div class="kart">
            <h3>${kisi.isim}</h3>
            <p>Departman: ${kisi.departman || "-"}</p>
            <p>Sicil: ${kisi.sicil || "-"}</p>
            <p>Telefon: ${kisi.telefon || "-"}</p>
            <p>Fiş Sayısı: ${kisi.fis || "-"}</p>
        </div>
    `;
});

/* 📩 MESAJ */
const mesajRef = doc(db, "mesajlar", kullanici);

let oncekiMesajSayisi = 0;

onSnapshot(mesajRef, (snap)=>{

    if(!snap.exists()) return;

    let data = snap.data().liste || [];

    let div = document.getElementById("mesajAlani");
    let sayac = document.getElementById("sayac");

    div.innerHTML = "";

    let okunmamis = 0;

    // 🔥 YENİ MESAJ SES + TOAST
    if(data.length > oncekiMesajSayisi){
        document.getElementById("ses").play();

        let toast = document.getElementById("toast");
        toast.style.display = "block";
        setTimeout(()=> toast.style.display="none", 3000);
    }

    oncekiMesajSayisi = data.length;

    // 📌 PIN'li mesajlar üste gelsin
    let sirali = data.slice().sort((a,b)=>(b.pin===true)-(a.pin===true));

    sirali.forEach((m,index)=>{

        let realIndex = data.indexOf(m);

        if(!m.okundu) okunmamis++;

        // ⏰ OTOMATİK SİLME
        if(m.sure && Date.now() > m.sure){
            silMesaj(realIndex);
            return;
        }

        let d = document.createElement("div");
        d.className = "kart "
            + (!m.okundu ? "yeniMesaj " : "")
            + (m.pin ? "pin" : "");

        d.innerHTML = `
            <p>${m.text}</p>
            <small>${new Date(m.tarih).toLocaleString()}</small><br>

            ${!m.okundu ? `<button onclick="okunduYap(${realIndex})">✔ Okundu</button>` : ""}

            <button onclick="silMesaj(${realIndex})">🗑️ Sil</button>
            <button onclick="pinMesaj(${realIndex})">📌 Pin</button>
        `;

        div.appendChild(d);
    });

    sayac.innerText = okunmamis > 0 ? okunmamis : "";

});

/* ✔ OKUNDU */
window.okunduYap = async function(index){
    let snap = await getDoc(mesajRef);
    let liste = snap.data().liste || [];
    liste[index].okundu = true;
    await setDoc(mesajRef, {liste});
}

/* 🗑️ SİL */
window.silMesaj = async function(index){
    let snap = await getDoc(mesajRef);
    let liste = snap.data().liste || [];
    liste.splice(index,1);
    await setDoc(mesajRef, {liste});
}

/* 📌 PIN */
window.pinMesaj = async function(index){
    let snap = await getDoc(mesajRef);
    let liste = snap.data().liste || [];
    liste[index].pin = !liste[index].pin;
    await setDoc(mesajRef, {liste});
}

/* 🧹 TÜMÜNÜ SİL */
window.tumunuSil = async function(){
    await setDoc(mesajRef, {liste: []});
}

/* ✔ OKUNANLARI SİL */
window.okunanlariSil = async function(){
    let snap = await getDoc(mesajRef);
    let liste = snap.data().liste || [];
    liste = liste.filter(m => !m.okundu);
    await setDoc(mesajRef, {liste});
}

</script>

</body>
</html>
