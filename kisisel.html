<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kişisel Performans Paneli</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: #0f172a;
    color: white;
}

/* üst bar */
.topbar {
    display: flex;
    justify-content: space-between;
    padding: 20px;
}

/* mesaj animasyon */
.alert {
    background: red;
    padding: 10px 20px;
    border-radius: 10px;
    animation: blink 1s infinite;
}
@keyframes blink {
    0% {opacity:1;}
    50% {opacity:0.3;}
    100% {opacity:1;}
}

.container {
    padding: 20px;
}

/* kart */
.kart {
    background: #1e293b;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
    max-width: 400px;
    margin-bottom: 20px;
    animation: fadeIn 0.7s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

p {
    display: flex;
    justify-content: space-between;
    margin: 8px 0;
}

.high { color: #22c55e; }
.low { color: #ef4444; }

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-bottom: 15px;
    width: 250px;
}
</style>
</head>

<body>

<div class="topbar">
    <h2>⚡ Kişisel Panel</h2>
    <div id="alertBox" class="alert" style="display:none;">Yeni Mesaj!</div>
</div>

<div class="container">

<input type="text" id="myName" placeholder="İsmini yaz...">

<div id="kart"></div>
<canvas id="grafik"></canvas>

</div>

<script>

// 🔴 BURAYA GOOGLE SHEET CSV LİNKİNİ KOY
const SHEET_URL = "BURAYA_YAPIŞTIR";

// mesaj animasyonu
setInterval(() => {
    const box = document.getElementById("alertBox");
    box.style.display = "block";
    setTimeout(() => box.style.display = "none", 3000);
}, 15000);

// CSV parse
async function loadData() {
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    const rows = text.split("\\n").map(r => r.split(","));

    const headers = rows[0];

    const data = rows.slice(1).map(row => {
        let obj = {};
        headers.forEach((h,i) => obj[h.trim()] = row[i]);
        return obj;
    });

    return data;
}

let allData = [];

loadData().then(d => {
    allData = d;
});

// render
function render() {
    const name = document.getElementById("myName").value.toLowerCase();

    const me = allData.find(x => x.isim?.toLowerCase() === name);

    if (!me) return;

    const avg = allData.reduce((a,b)=>a + Number(b.kpuan || 0),0) / allData.length;

    document.getElementById("kart").innerHTML = `
    <div class="kart">
        <h2>${me.isim}</h2>
        <p><span>Departman</span><b>${me.departman}</b></p>
        <p><span>Sicil</span><b>${me.sicil}</b></p>
        <p><span>Fiş</span><b>${me.fis}</b></p>
        <p><span>Kpuan</span><b class="${me.kpuan>=avg?'high':'low'}">${me.kpuan}</b></p>
        <p><span>Ortalama</span><b>${avg.toFixed(1)}</b></p>
    </div>`;

    drawChart(me, avg);
}

function drawChart(me, avg){
    new Chart(document.getElementById('grafik'), {
        type: 'doughnut',
        data: {
            labels: ['Sen', 'Ortalama'],
            datasets: [{
                data: [Number(me.kpuan), avg]
            }]
        }
    });
}

// input dinle
document.getElementById("myName").addEventListener("input", render);

</script>

</body>
</html>
