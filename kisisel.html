<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kişisel Panel</title>

<style>
body { font-family: 'Segoe UI'; background:#0f172a; color:white; margin:0; }

.header {
    background:#1e293b;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.container { max-width:700px; margin:20px auto; }

.kart {
    background:#1e293b;
    padding:15px;
    margin:10px;
    border-radius:12px;
}

select {
    padding:8px;
    border-radius:8px;
    margin:10px;
}

.iyi { color:#22c55e; }
.orta { color:#facc15; }
.kotu { color:#ef4444; }

.bar { height:8px; background:#333; border-radius:10px; }
.bar-inner { height:100%; background:#22c55e; }

.yeniMesaj { border-left:4px solid red; }

button {
    padding:8px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
}
</style>
</head>

<body>

<div class="header">
    👤 Panel
    <span id="sayac"></span>
</div>

<div class="container">

<!-- 🔥 ADMIN SEÇİM -->
<div id="adminSec" style="display:none;">
    <select id="kisiSelect"></select>
</div>

<div id="bilgi"></div>
<div id="lider"></div>

<h3>📩 Mesajlar</h3>

<button onclick="tumunuSil()">🧹 Tümünü Sil</button>
<button onclick="okunanlariSil()">✔ Okunanları Sil</button>

<div id="mesajAlani"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let kullanici = (localStorage.getItem("kullanici") || "").toLowerCase();
let seciliKisi = kullanici;
let tumData = [];

/* 🔥 GOOGLE SHEETS */
fetch("https://script.google.com/macros/s/AKfycbxODlNf0yl2oAtkd5oMw1ghWavKSOO8TmT81uAUN8Oiqbj8yzx81x7iRexwcAHo7ecv4g/exec")
.then(res => res.json())
.then(data => {

    tumData = data.filter(x => x.isim && x.isim.trim() !== "");

    /* 🔥 ADMIN MI */
    if(kullanici === "admin"){
        document.getElementById("adminSec").style.display = "block";

        let select = document.getElementById("kisiSelect");

        tumData.forEach(k => {
            let opt = document.createElement("option");
            opt.value = k.isim.toLowerCase();
            opt.innerText = k.isim;
            select.appendChild(opt);
        });

        select.onchange = () => {
            seciliKisi = select.value;
            goster();
        };

        seciliKisi = tumData[0]?.isim.toLowerCase();
    }

    goster();
});

/* 🔥 GÖSTER */
function goster(){

    let kisi = tumData.find(x =>
        x.isim.toLowerCase() === seciliKisi
    );

    if(!kisi){
        document.getElementById("bilgi").innerHTML = "Veri yok ❌";
        return;
    }

    let puan = Number(kisi.kpuan || 0);

    let durum = puan >= 80 ? "iyi" : puan >= 50 ? "orta" : "kotu";

    document.getElementById("bilgi").innerHTML = `
        <div class="kart">
            <h2>${kisi.isim}</h2>
            <p>Departman: ${kisi.departman || "-"}</p>
            <p>Fiş: ${kisi.fis || "-"}</p>
            <p>Kpuan: <b class="${durum}">${puan}</b></p>

            <div class="bar">
                <div class="bar-inner" style="width:${puan}%"></div>
            </div>
        </div>
    `;

    /* 🔥 TOP 3 */
    let top3 = [...tumData]
        .sort((a,b)=>(b.kpuan||0)-(a.kpuan||0))
        .slice(0,3);

    document.getElementById("lider").innerHTML = `
        <div class="kart">
        🏆 En İyi 3<br>
        ${top3.map((x,i)=>`${i+1}. ${x.isim} (${x.kpuan})`).join("<br>")}
        </div>
    `;
}

/* 📩 MESAJ */
const mesajRef = doc(db, "mesajlar", kullanici);

onSnapshot(mesajRef, (snap)=>{

    if(!snap.exists()) return;

    let data = snap.data().liste || [];

    let div = document.getElementById("mesajAlani");
    let sayac = document.getElementById("sayac");

    div.innerHTML = "";

    let okunmamis = 0;

    data.slice().reverse().forEach((m,index)=>{

        let realIndex = data.length - 1 - index;

        if(!m.okundu) okunmamis++;

        let d = document.createElement("div");
        d.className = "kart " + (!m.okundu ? "yeniMesaj" : "");

        d.innerHTML = `
            <p>${m.text}</p>
            <small>${new Date(m.tarih).toLocaleString()}</small><br>
            ${!m.okundu ? `<button onclick="okunduYap(${realIndex})">✔</button>` : ""}
            <button onclick="silMesaj(${realIndex})">🗑️</button>
        `;

        div.appendChild(d);
    });

    sayac.innerText = okunmamis > 0 ? okunmamis : "";
});

/* MESAJ FONKSİYON */
window.okunduYap = async function(i){
    let snap = await getDoc(mesajRef);
    let liste = snap.data().liste;
    liste[i].okundu = true;
    await setDoc(mesajRef,{liste});
}

window.silMesaj = async function(i){
    let snap = await getDoc(mesajRef);
    let liste = snap.data().liste;
    liste.splice(i,1);
    await setDoc(mesajRef,{liste});
}

window.tumunuSil = async function(){
    await setDoc(mesajRef,{liste:[]});
}

window.okunanlariSil = async function(){
    let snap = await getDoc(mesajRef);
    let liste = snap.data().liste.filter(x=>!x.okundu);
    await setDoc(mesajRef,{liste});
}

</script>

</body>
</html>
