<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kasa Sistem</title>

<style>
body {
    font-family: Arial;
    background:#0b1020;
    color:white;
    margin:0;
}

/* APP BAR (girişte gizli) */
.appbar {
    position:fixed;
    top:0;
    width:100%;
    height:60px;
    background:#1f2937;
    display:none;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    z-index:10;
}

/* TAB BAR (girişte gizli) */
.tabbar {
    position:fixed;
    bottom:0;
    width:100%;
    height:70px;
    background:#1f2937;
    display:none;
    justify-content:space-around;
    align-items:center;
    z-index:10;
}

/* giriş sonrası göster */
body.girisYapildi .appbar,
body.girisYapildi .tabbar {
    display:flex;
}

/* LOGIN */
#login {
    height:100dvh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.loginCard {
    width:85%;
    background:#1f2937;
    padding:25px;
    border-radius:20px;
}

/* APP */
#app {
    display:none;
    padding-top:60px;
    padding-bottom:70px;
}

body.girisYapildi #app {
    display:block;
}

/* INPUT */
input {
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:12px;
    border:none;
}

/* BUTTON */
button {
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:12px;
    border:none;
    background:#22c55e;
    color:white;
}

/* KASA */
.kasa {
    display:flex;
    gap:10px;
    margin:10px;
    padding:14px;
    border-radius:16px;
}

.erkek { background:linear-gradient(135deg,#3b82f6,#1e3a8a); }
.kadin { background:linear-gradient(135deg,#ff6ec7,#c2185b); }

input.molada {
    background:red !important;
    color:white !important;
}

#alan {
    overflow-y:auto;
    height:calc(100dvh - 140px);
}
</style>
</head>

<body>

<div class="appbar">Kasa Sistem</div>

<!-- LOGIN -->
<div id="login">
<div class="loginCard">
<h2>Giriş Yap</h2>
<input id="kullanici" placeholder="Kullanıcı adı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş</button>
</div>
</div>

<!-- APP -->
<div id="app">

<button onclick="window.location.href='mola.html'">☕ Mola</button>

<div id="alan"></div>

</div>

<div class="tabbar">
<button onclick="window.location.reload()">🏠 Ana</button>
<button onclick="window.location.href='mola.html'">☕ Mola</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"ukasa1.firebaseapp.com",
  projectId:"ukasa1"
});

const db = getFirestore(app);

let admin = {k:"admin", s:"1234"};
let personeller = [];
let adminMi = false;
let inputs = [];
let alan = document.getElementById("alan");

/* PERSONELİ BAŞTA ÇEK */
const refPersonel = doc(db,"kasa","personel");
onSnapshot(refPersonel,(snap)=>{
    if(snap.exists()) personeller = snap.data().liste;
});

/* GİRİŞ */
window.giris = async function(){

    let k = document.getElementById("kullanici").value.trim();
    let s = document.getElementById("sifre").value.trim();

    if(k === admin.k && s === admin.s){
        adminMi = true;
    } else {
        let bulundu = personeller.find(p=>p.k===k && p.s===s);
        if(!bulundu){
            alert("Hatalı giriş");
            return;
        }
    }

    document.body.classList.add("girisYapildi");
    document.getElementById("login").style.display="none";

    olustur();
}

/* KASA ÇEK */
function olustur(){
    const ref = doc(db,"kasa","liste");

    onSnapshot(ref,(snap)=>{
        let kayit = snap.exists()?snap.data().data:{};

        alan.innerHTML="";
        inputs=[];

        for(let i=0;i<6;i++){
            let div=document.createElement("div");
            div.className="kasa";

            let i1=document.createElement("input");
            let i2=document.createElement("input");

            let k=kayit["kasa"+(i+1)];
            if(k){
                i1.value=k.sol;
                i2.value=k.sag;
            }

            if(!adminMi){
                i1.disabled=true;
                i2.disabled=true;
            }

            div.appendChild(i1);
            div.appendChild(i2);
            alan.appendChild(div);

            inputs.push(i1,i2);
        }
    });
}

</script>

</body>
</html>
