<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Kasa Sistem</title>

<style>
body { font-family: Arial; background:#0b1020; color:white; margin:0; }

/* BAR */
.appbar,.tabbar{display:none;}
body.girisYapildi .appbar,
body.girisYapildi .tabbar{display:flex;}

.appbar{position:fixed;top:0;width:100%;height:60px;background:#1f2937;justify-content:center;align-items:center;}
.tabbar{position:fixed;bottom:0;width:100%;height:70px;background:#1f2937;justify-content:space-around;align-items:center;}

/* LOGIN */
#login{height:100vh;display:flex;justify-content:center;align-items:center;}
.loginCard{width:85%;background:#1f2937;padding:25px;border-radius:20px;}

/* ✍️ İMZA (STABİL) */
.imza{
    margin-top:12px;
    text-align:center;
    font-family:cursive;
    font-size:16px;
    color:#6b7280;
    opacity:0.8;
}

/* APP */
#app{display:none;padding-top:60px;padding-bottom:70px;}
body.girisYapildi #app{display:block;}

input{width:100%;padding:14px;margin:6px 0;border-radius:12px;border:none;}
button{width:100%;padding:12px;margin:5px 0;border-radius:10px;border:none;background:#22c55e;color:white;}

.kasa{display:flex;gap:10px;margin:10px;padding:14px;border-radius:16px;font-weight:bold;}
.erkek{background:linear-gradient(135deg,#3b82f6,#1e3a8a);}
.kadin{background:linear-gradient(135deg,#ff6ec7,#c2185b);}
.aktif{box-shadow:0 0 12px lime;}

@keyframes yanipSonme{
0%{background:#8B0000;}
50%{background:#ff0000;}
100%{background:#8B0000;}
}
input.molada{animation:yanipSonme 1s infinite;color:white;}

#alan{overflow-y:auto;height:calc(100vh - 140px);}

/* ADMIN */
.ustButonlar{position:fixed;right:10px;bottom:90px;display:flex;flex-direction:column;gap:8px;}
.ustButonlar button{width:55px;height:55px;border-radius:50%;}

.panel{background:#1f2937;margin:10px;padding:10px;border-radius:12px;max-height:0;overflow:hidden;transition:0.3s;}
.panel.acik{max-height:300px;overflow:auto;}

/* 🔥 SAYAÇ FIX */
#buyukSayac{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
width:260px;
background:black;
color:#22c55e;
text-align:center;
font-size:22px;
padding:10px;
border-radius:12px;
z-index:9999;
display:none;
}

body.girisYapildi #buyukSayac{
display:block;
}
</style>
</head>

<body>

<div class="appbar">Kasa Sistem</div>

<!-- LOGIN -->
<div id="login">
<div class="loginCard">

<h2>Giriş</h2>

<input id="kullanici" placeholder="Kullanıcı adı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş</button>

<!-- ✍️ İMZA -->
<div class="imza">Ümüt SALMAN</div>

</div>
</div>

<!-- APP -->
<div id="app">

<button onclick="location.href='mola.html'">☕ Mola</button>

<button id="mesajBtn" style="display:none;" onclick="location.href='mesaj.html'">📩 Mesaj</button>
<button id="panelBtn" style="display:none;" onclick="panelToggle()">👥 Personel</button>

<div class="ustButonlar">
<button id="kaydetBtn" style="display:none;" onclick="kaydet()">💾</button>
<button id="kaydirBtn" style="display:none;" onclick="kaydir()">⬇️</button>
<button id="degistirBtn" style="display:none;" onclick="degistir()">↔️</button>
</div>

<div id="alan"></div>

<div id="panel" class="panel">
<input id="yeniK" placeholder="Kullanıcı">
<input id="yeniS" placeholder="Şifre">
<button onclick="ekle()">Ekle</button>
<div id="liste"></div>
</div>

</div>

<div class="tabbar">
<button onclick="location.reload()">🏠</button>
<button onclick="location.href='mola.html'">☕</button>
</div>

<!-- 🔥 SAYAÇ -->
<div id="buyukSayac">--:--</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"ukasa1.firebaseapp.com",
projectId:"ukasa1"
});

const db = getFirestore(app);

let admin={k:"admin",s:"1234"};
let personeller=[];
let adminMi=false;
let alan=document.getElementById("alan");
let inputs=[];

/* PERSONEL */
onSnapshot(doc(db,"kasa","personel"),snap=>{
if(snap.exists()) personeller=snap.data().liste;
listeGoster();
});

/* MOLA */
let molaData={};
onSnapshot(doc(db,"kasa","mola"),snap=>{
molaData=snap.exists()?snap.data().data:{};
olustur();
});

/* GİRİŞ */
window.giris=function(){
let k=kullanici.value.trim();
let s=sifre.value.trim();

localStorage.removeItem("kullanici");

if(k===admin.k && s===admin.s){
adminMi=true;
mesajBtn.style.display="block";
panelBtn.style.display="block";
kaydetBtn.style.display="block";
kaydirBtn.style.display="block";
degistirBtn.style.display="block";
}else{
let bulundu=personeller.find(p=>p.k===k && p.s===s);
if(!bulundu){alert("Hatalı giriş");return;}
}

localStorage.setItem("kullanici",k);
document.body.classList.add("girisYapildi");
login.style.display="none";

olustur();
}

/* KASA */
function cinsiyet(isim){
let kadin=["ayşe","fatma","zeynep","elif","buse"];
return kadin.includes((isim||"").toLowerCase())?"kadin":"erkek";
}

/* 🔥 DÜZELTİLMİŞ MOLA */
function moladaMi(isim){
if(!isim)return false;

let now=new Date();
let gruplar=["cay","yemek","son"];

for(let g of gruplar){
for(let i=1;i<=4;i++){

let key=g+i;
let saat=molaData[key]?.saat;
let kisiler=molaData[key]?.kisiler||[];

if(!saat) continue;
if(!kisiler.map(x=>x.toLowerCase()).includes(isim.toLowerCase())) continue;

let [h,m]=saat.split(":");
let hedef=new Date();
hedef.setHours(h,m,0);

let sure;
if(g==="yemek") sure=(molaData["yemekSure"]?.sure||45)*60;
else if(g==="cay") sure=(molaData["caySure"]?.sure||15)*60;
else sure=(molaData["sonSure"]?.sure||10)*60;

let fark=(now - hedef)/1000;

if(fark>=0 && fark<sure) return true;

}
}
return false;
}

function olustur(){
onSnapshot(doc(db,"kasa","liste"),snap=>{

let kayit=snap.exists()?snap.data().data:{};
alan.innerHTML="";
inputs=[];

for(let i=0;i<6;i++){

let div=document.createElement("div");
div.className="kasa";

let i1=document.createElement("input");
let i2=document.createElement("input");

let k=kayit["kasa"+(i+1)];
if(k){
i1.value=k.sol;
i2.value=k.sag;
}

i1.disabled=!adminMi;
i2.disabled=!adminMi;

div.classList.add(cinsiyet(i1.value||i2.value));

if(moladaMi(i1.value)) i1.classList.add("molada");
if(moladaMi(i2.value)) i2.classList.add("molada");

div.classList.add("aktif");

div.appendChild(i1);
div.appendChild(i2);
alan.appendChild(div);

inputs.push(i1,i2);
}
});
}

</script>

</body>
</html>
