<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasa Sistem</title>

<style>
body {
    font-family: Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

.container {
    max-width:600px;
    margin:auto;
}

.menu {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:5px;
    margin-bottom:10px;
}

input {
    width:90%;
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#fff;
    color:#000;
    font-weight:bold;
}

button {
    padding:10px;
    border-radius:8px;
    border:none;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

.kasa {
    display:flex;
    justify-content:space-between;
    margin:10px;
    padding:12px;
    border-radius:12px;
    background:#2a2a3d;
    box-shadow:0 0 10px lime;
}

.panel {
    background:#222;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

.mesajPanel {
    background:#111;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h2>Kasa Sistem</h2>

<!-- LOGIN -->
<div id="login">
<input id="kullanici" placeholder="Kullanıcı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="menu">
<button onclick="window.location.href='mola.html'">☕ Mola</button>
<button onclick="window.location.href='kisisel.html'">👤 Kişisel</button>

<button id="panelBtn" onclick="panelToggle()" style="display:none;">👥 Personel</button>
<button id="mesajBtn" onclick="mesajToggle()" style="display:none;">📩 Mesaj</button>

<button id="kaydetBtn" onclick="kaydet()" style="display:none;">💾 Kaydet</button>
<button id="kaydirBtn" onclick="kaydir()" style="display:none;">⬇️ Kaydır</button>
<button id="degistirBtn" onclick="degistir()" style="display:none;">↔️ Değiştir</button>
</div>

<div id="alan"></div>

<!-- PERSONEL -->
<div id="panel" class="panel hidden">
<h4>👥 Personel</h4>

<input id="yeniK" placeholder="Kullanıcı">
<input id="yeniS" placeholder="Şifre">
<button onclick="ekle()">Ekle</button>

<div id="liste"></div>
</div>

<!-- MESAJ -->
<div id="mesajPanel" class="mesajPanel hidden">

<h4>📩 Mesaj Gönder</h4>

<div id="kisiSec"></div>

<input id="mesajText" placeholder="Mesaj">

<label><input type="checkbox" id="onemli"> 📌 Önemli</label><br>

<input id="sureInput" type="number" placeholder="Süre (dk)">

<button onclick="mesajGonder()">Gönder</button>
<button onclick="tumuneGonder()">Tümüne</button>

</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let admin = {k:"admin", s:"1234"};
let personeller = [];
let adminMi = false;
let inputs = [];

const alan = document.getElementById("alan");

/* GİRİŞ */
window.giris = function(){

    const ref = doc(db, "kasa", "personel");

    onSnapshot(ref, (snap)=>{

        if(snap.exists()) personeller = snap.data().liste || [];

        let k = document.getElementById("kullanici").value.trim();
        let s = document.getElementById("sifre").value.trim();

        if(k === admin.k && s === admin.s){
            adminMi = true;
            document.getElementById("panelBtn").style.display="inline-block";
            document.getElementById("mesajBtn").style.display="inline-block";
        }else{
            let bulundu = personeller.find(p=>p.k===k && p.s===s);
            if(!bulundu){ alert("Hatalı giriş"); return; }
        }

        localStorage.setItem("kullanici",k);

        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");

        olustur();
        listeGoster();
    });
}

/* PANEL */
window.panelToggle = function(){
    document.getElementById("panel").classList.toggle("hidden");
}

window.mesajToggle = function(){
    document.getElementById("mesajPanel").classList.toggle("hidden");
    kisiListe();
}

/* PERSONEL */
function listeGoster(){
    let div = document.getElementById("liste");
    div.innerHTML="";

    personeller.forEach((p,i)=>{
        let d=document.createElement("div");
        d.innerHTML = `${p.k} <button onclick="sil(${i})">❌</button>`;
        div.appendChild(d);
    });
}

window.sil = async function(i){
    personeller.splice(i,1);
    await setDoc(doc(db,"kasa","personel"),{liste: personeller});
}

window.ekle = async function(){
    let k = document.getElementById("yeniK").value;
    let s = document.getElementById("yeniS").value;

    if(!k || !s) return;

    personeller.push({k,s});

    await setDoc(doc(db,"kasa","personel"),{liste: personeller});

    document.getElementById("yeniK").value="";
    document.getElementById("yeniS").value="";
}

/* KASA */
function olustur(){

    const ref = doc(db,"kasa","liste");

    onSnapshot(ref,(snap)=>{

        let kayit = snap.exists() ? snap.data().data : {};

        alan.innerHTML="";
        inputs=[];

        for(let i=0;i<6;i++){

            let div = document.createElement("div");
            div.className="kasa";

            let i1=document.createElement("input");
            let i2=document.createElement("input");

            let k = kayit["kasa"+(i+1)];
            if(k){
                i1.value=k.sol;
                i2.value=k.sag;
            }

            if(!adminMi){
                i1.disabled=true;
                i2.disabled=true;
            }

            div.appendChild(i1);
            div.appendChild(i2);
            alan.appendChild(div);

            inputs.push(i1,i2);
        }

        if(adminMi){
            document.getElementById("kaydetBtn").style.display="inline-block";
            document.getElementById("kaydirBtn").style.display="inline-block";
            document.getElementById("degistirBtn").style.display="inline-block";
        }

    });
}

/* KAYDET */
window.kaydet = async function(){
    let data={};
    for(let i=0;i<inputs.length;i+=2){
        data["kasa"+(i/2+1)]={sol:inputs[i].value,sag:inputs[i+1].value};
    }
    await setDoc(doc(db,"kasa","liste"),{data});
}

/* KİŞİ LİSTE */
function kisiListe(){
    let div = document.getElementById("kisiSec");
    div.innerHTML="";
    personeller.forEach(p=>{
        let label=document.createElement("label");
        label.innerHTML = `<input type="checkbox" value="${p.k}"> ${p.k}`;
        div.appendChild(label);
        div.appendChild(document.createElement("br"));
    });
}

/* MESAJ */
window.mesajGonder = async function(){

    let msg = document.getElementById("mesajText").value;
    let onemli = document.getElementById("onemli").checked;
    let dk = parseInt(document.getElementById("sureInput").value || 0);

    let secilen = [...document.querySelectorAll("#kisiSec input:checked")]
                    .map(x=>x.value);

    for(let kisi of secilen){
        await setDoc(doc(db,"mesajlar",kisi),{
            text:msg,
            okundu:false,
            onemli:onemli,
            silme: dk ? Date.now() + (dk*60000) : null
        });
    }

    alert("Gönderildi");
}

window.tumuneGonder = async function(){

    let msg = document.getElementById("mesajText").value;
    let dk = parseInt(document.getElementById("sureInput").value || 0);

    for(let p of personeller){
        await setDoc(doc(db,"mesajlar",p.k),{
            text:msg,
            okundu:false,
            silme: dk ? Date.now() + (dk*60000) : null
        });
    }

    alert("Herkese gönderildi");
}

</script>

</body>
</html>
