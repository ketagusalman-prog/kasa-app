<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasa Sistem</title>

<style>
body { font-family: Arial; background:#1e1e2f; color:white; text-align:center;}
.container { max-width:400px; margin:auto; position:relative; }

input {
    width:90%;
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#fff;
    color:#000;
    font-weight:bold;
}

input:disabled {
    background:#ddd;
    color:#000;
    opacity:1;
}

button { padding:10px; margin:5px; border-radius:8px; border:none; background:#4CAF50; color:white;}

.kasa {
    display:flex;
    justify-content:space-between;
    margin:10px;
    padding:12px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer; /* 🔥 TIKLANABİLİR */
}

.erkek { background:linear-gradient(135deg,#2196F3,#0d47a1); }
.kadin { background:linear-gradient(135deg,#ff6ec7,#c2185b); }

.aktif {
    box-shadow:0 0 10px lime;
}

@keyframes yanipSonme {
    0%   { background:#8B0000; box-shadow:0 0 5px red; }
    50%  { background:#ff0000; box-shadow:0 0 20px red; }
    100% { background:#8B0000; box-shadow:0 0 5px red; }
}

input.molada {
    background:#8B0000 !important;
    color:#fff !important;
    animation: yanipSonme 1s infinite;
}

.hidden { display:none; }

.panel {
    background:#222;
    padding:10px;
    margin:10px;
    border-radius:10px;
    max-height:0;
    overflow:hidden;
    transition:all 0.4s ease;
}

.panel.acik {
    max-height:400px;
    overflow-y:auto;
}

.ustButonlar {
    position:absolute;
    top:120px;
    right:-180px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

/* 🔥 EXCEL PANEL */
.excelPanel{
    position:fixed;
    bottom:10px;
    right:10px;
    background:#111;
    padding:10px;
    border-radius:10px;
}

/* 🔥 POPUP */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#222;
    padding:20px;
    border-radius:12px;
    display:none;
    z-index:9999;
}
</style>
</head>

<body>

<div class="container">

<h2>Kasa Sistem</h2>

<div id="login">
<input id="kullanici" placeholder="Kullanıcı adı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş</button>
</div>

<div id="app" class="hidden">

<button onclick="window.location.href='mola.html'">☕ Mola Sayfası</button>

<button id="panelBtn" onclick="panelToggle()" style="display:none;">👥 Personel Paneli</button>

<div class="ustButonlar">
<button id="kaydetBtn" onclick="kaydet()" style="display:none;">Kaydet</button>
<button id="kaydirBtn" onclick="kaydir()" style="display:none;">⬇️ Kaydır</button>
<button id="degistirBtn" onclick="degistir()" style="display:none;">↔️ Yer Değiştir</button>
</div>

<div id="alan"></div>

<div id="panel" class="panel">
<input id="yeniK" placeholder="Kullanıcı">
<input id="yeniS" placeholder="Şifre">
<button onclick="ekle()">Ekle</button>
<div id="liste"></div>
</div>

</div>
</div>

<!-- 🔥 EXCEL PANEL -->
<div id="excelPanel" class="excelPanel" style="display:none;">
<input type="file" id="excelInput">
</div>

<!-- 🔥 POPUP -->
<div id="popup" class="popup"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let admin = {k:"admin", s:"1234"};
let personeller = [];
let adminMi = false;
let aktifKullanici = "";
let inputs = [];
let alan = document.getElementById("alan");

let excelData = [];

/* 🔥 EXCEL OKUMA */
document.getElementById("excelInput").addEventListener("change", function(e){
    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(evt){
        let data = new Uint8Array(evt.target.result);
        let wb = XLSX.read(data,{type:'array'});
        let sheet = wb.Sheets[wb.SheetNames[0]];
        excelData = XLSX.utils.sheet_to_json(sheet);
        alert("Excel yüklendi");
    }
    reader.readAsArrayBuffer(file);
});

/* 🔥 PERSONEL BUL */
function excelBul(isim){
    return excelData.find(x =>
        Object.values(x).join(" ").toLowerCase().includes(isim.toLowerCase())
    );
}

/* 🔥 POPUP */
function popupGoster(isim){
    if(!isim) return;

    if(!adminMi && isim !== aktifKullanici){
        alert("Sadece kendi bilginizi görebilirsiniz");
        return;
    }

    let kisi = excelBul(isim);
    if(!kisi){
        alert("Kayıt yok");
        return;
    }

    let p = document.getElementById("popup");
    p.innerHTML = "<b>"+isim+"</b><br><br>";

    for(let k in kisi){
        p.innerHTML += k + ": " + kisi[k] + "<br>";
    }

    p.style.display="block";

    setTimeout(()=> p.style.display="none",5000);
}

/* 🔥 GİRİŞ */
window.giris = function(){

    const ref = doc(db,"kasa","personel");

    onSnapshot(ref,(snap)=>{

        if(snap.exists()) personeller = snap.data().liste;

        let k = document.getElementById("kullanici").value;
        let s = document.getElementById("sifre").value;

        aktifKullanici = k;

        if(k===admin.k && s===admin.s){
            adminMi=true;
            document.getElementById("excelPanel").style.display="block";
        } else {
            let ok = personeller.find(p=>p.k===k && p.s===s);
            if(!ok){ alert("Hatalı"); return; }
        }

        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");

        olustur();
    });
}

/* 🔥 KASA OLUŞTUR */
function olustur(){

    const ref = doc(db,"kasa","liste");

    onSnapshot(ref,(snap)=>{

        let kayit = snap.exists()?snap.data().data:{};

        alan.innerHTML="";
        inputs=[];

        for(let i=0;i<6;i++){

            let div=document.createElement("div");
            div.className="kasa";

            let i1=document.createElement("input");
            let i2=document.createElement("input");

            let k = kayit["kasa"+(i+1)];
            if(k){
                i1.value=k.sol;
                i2.value=k.sag;
            }

            if(!adminMi){
                i1.disabled=true;
                i2.disabled=true;
            }

            /* 🔥 TIKLAMA */
            div.onclick=()=>{
                popupGoster(i1.value);
                popupGoster(i2.value);
            }

            div.appendChild(i1);
            div.appendChild(i2);
            alan.appendChild(div);

            inputs.push(i1,i2);
        }
    });
}

</script>
</body>
</html>
