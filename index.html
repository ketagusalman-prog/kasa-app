<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasa Sistemi</title>

<style>
body {
    font-family: Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

.container { max-width:1200px; margin:auto; }

.grid {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:15px;
}

/* 💳 KASA */
.kasa {
    border-radius:15px;
    padding:15px;
    color:white;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(0,0,0,0.5);
    transition:0.3s;
}

/* 👨 */
.erkek {
    background:linear-gradient(135deg,#2196F3,#0d47a1);
}

/* 👩 */
.kadin {
    background:linear-gradient(135deg,#ff6ec7,#c2185b);
}

/* 🔴 MOLADA */
.molada {
    background:linear-gradient(135deg,#8B0000,#ff0000) !important;
    box-shadow:0 0 20px red;
}

/* 🟢 AKTİF */
.aktifKasa {
    box-shadow:0 0 10px lime;
}

.kasaNo {
    font-size:16px;
}

.kisi {
    font-size:20px;
    margin:15px 0;
}

.durum {
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h2>Kasa Sistemi</h2>

<button onclick="window.location.href='mola.html'">☕ Mola</button>
<button onclick="cikis()">🚪 Çıkış</button>

<div id="alan" class="grid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let alan = document.getElementById("alan");

const kasaRef = doc(db,"kasa","veriler");
const molaRef = doc(db,"kasa","mola");

let kasaData = {};
let molaData = {};

// 🔄 KASA VERİ
onSnapshot(kasaRef, (snap)=>{
    kasaData = snap.exists()? snap.data().data : {};
    render();
});

// 🔄 MOLA VERİ
onSnapshot(molaRef, (snap)=>{
    molaData = snap.exists()? snap.data().data : {};
    render();
});

// 👨‍👩‍👧 CİNSİYET
function cinsiyetBelirle(isim){

    isim = (isim || "").toLowerCase();

    let kadinlar = ["ayşe","fatma","zeynep","elif","eda","melis","buse"];
    let erkekler = ["ahmet","mehmet","ali","hasan","emre","can","mert"];

    if(kadinlar.includes(isim)) return "kadin";
    if(erkekler.includes(isim)) return "erkek";

    return "erkek";
}

// 🔥 MOLA KONTROL
function moladaMi(isim){

    if(!isim) return false;

    let now = new Date();
    let gruplar = ["cay","yemek","son"];

    for(let g of gruplar){
        for(let i=1;i<=4;i++){

            let key = g+i;

            let saat = molaData[key]?.saat;
            let kisiler = molaData[key]?.kisiler || [];

            if(!saat) continue;

            let [h,m]=saat.split(":");

            let hedef=new Date();
            hedef.setHours(h,m,0);

            let sure = (molaData[g+"Sure"]?.sure || 15)*60;

            let fark = Math.floor((hedef-now)/1000);

            let molada = (fark<=0 && fark>-sure);

            if(molada && kisiler.map(x=>x.toLowerCase()).includes(isim.toLowerCase())){
                return true;
            }
        }
    }

    return false;
}

// 🎨 RENDER
function render(){

    alan.innerHTML="";

    // 🔥 boşsa bile 8 kasa göster
    let kasaList = Object.keys(kasaData).length ? kasaData : {
        "Kasa 1":{}, "Kasa 2":{}, "Kasa 3":{}, "Kasa 4":{},
        "Kasa 5":{}, "Kasa 6":{}, "Kasa 7":{}, "Kasa 8":{}
    };

    Object.keys(kasaList).forEach(key=>{

        let isim = kasaList[key]?.isim || "";

        let div = document.createElement("div");
        div.className="kasa";

        let cinsiyet = cinsiyetBelirle(isim);
        div.classList.add(cinsiyet);

        let no = document.createElement("div");
        no.className="kasaNo";
        no.innerText = key;
        div.appendChild(no);

        let kisi = document.createElement("div");
        kisi.className="kisi";
        kisi.innerText = isim || "-";
        div.appendChild(kisi);

        let durum = document.createElement("div");
        durum.className="durum";

        if(isim && moladaMi(isim)){
            div.classList.add("molada");
            durum.innerText="🔴 Molada";
        }
        else{
            div.classList.add("aktifKasa");
            durum.innerText="🟢 Aktif";
        }

        div.appendChild(durum);

        alan.appendChild(div);
    });
}

// 🚪 ÇIKIŞ
window.cikis = function(){
    localStorage.removeItem("kullanici");
    location.reload();
}

</script>

</body>
</html>
