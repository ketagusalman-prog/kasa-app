<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasa Sistem</title>

<style>
body { font-family: Arial; background:#1e1e2f; color:white; text-align:center;}
.container { max-width:500px; margin:auto; }

input {
    width:90%;
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#fff;
    color:#000;
    font-weight:bold;
}

button {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#4CAF50;
    color:white;
}

.kasa {
    display:flex;
    justify-content:space-between;
    margin:10px;
    padding:12px;
    border-radius:12px;
    font-weight:bold;
}

.aktif { box-shadow:0 0 10px lime; }

.hidden { display:none; }

.panel {
    background:#222;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

.mesajPanel {
    background:#111;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

/* 🔥 YENİ: MOLA EFEKT */
.molaAktif {
    animation: yanipSon 1s infinite;
}

@keyframes yanipSon {
    0% { box-shadow: 0 0 5px red; }
    50% { box-shadow: 0 0 25px red; }
    100% { box-shadow: 0 0 5px red; }
}
</style>
</head>

<body>

<div class="container">

<h2>Kasa Sistem</h2>

<div id="login">
<input id="kullanici" placeholder="Kullanıcı adı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş</button>
</div>

<div id="app" class="hidden">

<button onclick="window.location.href='mola.html'">☕ Mola</button>
<button onclick="window.location.href='kisisel.html'">👤 Kişisel Panel</button>

<button id="panelBtn" onclick="panelToggle()" style="display:none;">👥 Personel</button>
<button id="mesajBtn" onclick="mesajToggle()" style="display:none;">📩 Mesaj</button>

<div>
<button id="kaydetBtn" onclick="kaydet()" style="display:none;">Kaydet</button>
<button id="kaydirBtn" onclick="kaydir()" style="display:none;">Kaydır</button>
<button id="degistirBtn" onclick="degistir()" style="display:none;">Değiştir</button>
</div>

<div id="alan"></div>

<div id="panel" class="panel hidden">
<h4>Personel</h4>
<input id="yeniK">
<input id="yeniS">
<button onclick="ekle()">Ekle</button>
<div id="liste"></div>
</div>

<div id="mesajPanel" class="mesajPanel hidden">
<h4>📩 Mesaj Gönder</h4>

<div id="kisiSec"></div>

<input id="mesajText" placeholder="Mesaj yaz">

<button onclick="mesajGonder()">Gönder</button>
<button onclick="tumuneGonder()">Tümüne</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let admin = {k:"admin", s:"1234"};
let personeller = [];
let adminMi = false;
let inputs = [];
let alan = document.getElementById("alan");

/* 🔥 YENİ */
let moladakiler = [];

/* 🔥 MOLA VERİSİ */
const molaRef = doc(db, "kasa", "mola");

onSnapshot(molaRef, (snap) => {

    moladakiler = [];

    if(!snap.exists()) return;

    let data = snap.data().data || {};

    Object.keys(data).forEach(k => {
        if(data[k]?.kisiler){
            data[k].kisiler.forEach(isim => {
                if(isim) moladakiler.push(isim.toLowerCase());
            });
        }
    });
});

/* GİRİŞ */
window.giris = function(){

    const ref = doc(db, "kasa", "personel");

    onSnapshot(ref, (snap)=>{

        if(snap.exists()) personeller = snap.data().liste;

        let k = document.getElementById("kullanici").value.trim();
        let s = document.getElementById("sifre").value.trim();

        if(k === admin.k && s === admin.s){
            adminMi = true;
            panelBtn.style.display="block";
            mesajBtn.style.display="block";
        }else{
            let bulundu = personeller.find(p=>p.k===k && p.s===s);
            if(!bulundu){ alert("Hatalı"); return; }
        }

        localStorage.setItem("kullanici",k);

        login.classList.add("hidden");
        app.classList.remove("hidden");

        olustur();
        listeGoster();
    });
}

window.panelToggle = function(){
    panel.classList.toggle("hidden");
}

window.mesajToggle = function(){
    mesajPanel.classList.toggle("hidden");
    kisiListe();
}

/* KASA */
function olustur(){

    const ref = doc(db,"kasa","liste");

    onSnapshot(ref,(snap)=>{

        let kayit = snap.exists() ? snap.data().data : {};

        alan.innerHTML="";
        inputs=[];

        for(let i=0;i<6;i++){

            let div = document.createElement("div");
            div.className="kasa aktif";

            let i1=document.createElement("input");
            let i2=document.createElement("input");

            let k = kayit["kasa"+(i+1)];
            if(k){
                i1.value=k.sol;
                i2.value=k.sag;
            }

            if(!adminMi){
                i1.disabled=true;
                i2.disabled=true;
            }

            div.appendChild(i1);
            div.appendChild(i2);
            alan.appendChild(div);

            inputs.push(i1,i2);

            /* 🔥 MOLA KONTROL */
            setInterval(()=>{

                let isim1 = (i1.value || "").toLowerCase();
                let isim2 = (i2.value || "").toLowerCase();

                if(moladakiler.includes(isim1) || moladakiler.includes(isim2)){
                    div.classList.add("molaAktif");
                }else{
                    div.classList.remove("molaAktif");
                }

            },1000);
        }

        if(adminMi){
            kaydetBtn.style.display="block";
            kaydirBtn.style.display="block";
            degistirBtn.style.display="block";
        }

    });
}

/* KİŞİ SEÇ */
function kisiListe(){
    let div=kisiSec;
    div.innerHTML="";
    personeller.forEach(p=>{
        let label=document.createElement("label");
        label.innerHTML=`<input type="checkbox" value="${p.k}"> ${p.k}`;
        div.appendChild(label);
        div.appendChild(document.createElement("br"));
    });
}

/* MESAJ */
window.mesajGonder = async function(){

    let msg = mesajText.value;

    let secilen = [...document.querySelectorAll("#kisiSec input:checked")]
                    .map(x=>x.value);

    for(let kisi of secilen){

        let ref = doc(db,"mesajlar",kisi);
        let snap = await getDoc(ref);

        let eski = snap.exists() ? snap.data().liste || [] : [];

        eski.push({
            text: msg,
            okundu:false,
            tarih: new Date().toISOString()
        });

        await setDoc(ref,{liste:eski});
    }

    alert("Gönderildi");
}

window.tumuneGonder = async function(){

    let msg = mesajText.value;

    for(let p of personeller){

        let ref = doc(db,"mesajlar",p.k);
        let snap = await getDoc(ref);

        let eski = snap.exists() ? snap.data().liste || [] : [];

        eski.push({
            text: msg,
            okundu:false,
            tarih: new Date().toISOString()
        });

        await setDoc(ref,{liste:eski});
    }

    alert("Herkese gönderildi");
}

</script>

</body>
</html>
