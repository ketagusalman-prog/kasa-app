<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasa Sistem</title>

<style>
body { font-family: Arial; background:#1e1e2f; color:white; text-align:center;}
.container { max-width:400px; margin:auto; position:relative; }

input {
    width:90%;
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#fff;
    color:#000;
    font-weight:bold;
}

input:disabled {
    background:#ddd;
    color:#000;
    opacity:1;
}

button { padding:10px; margin:5px; border-radius:8px; border:none; background:#4CAF50; color:white;}

.kasa {
    display:flex;
    justify-content:space-between;
    margin:10px;
    padding:12px;
    border-radius:12px;
    font-weight:bold;
}

.erkek { background:linear-gradient(135deg,#2196F3,#0d47a1); }
.kadin { background:linear-gradient(135deg,#ff6ec7,#c2185b); }

.aktif { box-shadow:0 0 10px lime; }

/* 🔥 MOLADA YANIP SÖNME */
@keyframes yanipSonme {
    0%   { background:#8B0000; box-shadow:0 0 5px red; }
    50%  { background:#ff0000; box-shadow:0 0 20px red; }
    100% { background:#8B0000; box-shadow:0 0 5px red; }
}

input.molada {
    background:#8B0000 !important;
    color:#fff !important;
    animation: yanipSonme 1s infinite;
}

.hidden { display:none; }

.panel {
    background:#222;
    padding:10px;
    margin:10px;
    border-radius:10px;
    max-height:0;
    overflow:hidden;
    transition:all 0.4s ease;
}

.panel.acik {
    max-height:400px;
    overflow-y:auto;
}

.ustButonlar {
    position:absolute;
    top:120px;
    right:-180px;
    display:flex;
    flex-direction:column;
    gap:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>Kasa Sistem</h2>

<div id="login">
<input id="kullanici" placeholder="Kullanıcı adı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş</button>
</div>

<div id="appDiv" class="hidden">

<h3 id="info"></h3>

<!-- ✅ MOLA + ADMIN MESAJ BUTONU -->
<div>
<button onclick="window.location.href='mola.html'">☕ Mola Sayfası</button>
<button id="mesajBtn" onclick="window.location.href='mesaj.html'" style="display:none;">📩 Mesaj</button>
</div>

<button id="panelBtn" onclick="panelToggle()" style="display:none;">👥 Personel Paneli</button>

<div class="ustButonlar">
<button id="kaydetBtn" onclick="kaydet()" style="display:none;">Kaydet</button>
<button id="kaydirBtn" onclick="kaydir()" style="display:none;">⬇️ Kaydır</button>
<button id="degistirBtn" onclick="degistir()" style="display:none;">↔️ Yer Değiştir</button>
</div>

<div id="alan"></div>

<div id="panel" class="panel">
<h4>👥 Personel</h4>
<input id="yeniK" placeholder="Kullanıcı">
<input id="yeniS" placeholder="Şifre">
<button onclick="ekle()">Ekle</button>
<div id="liste"></div>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let admin = {k:"admin", s:"1234"};
let personeller = [];
let adminMi = false;
let inputs = [];
let alan = document.getElementById("alan");

/* MOLA DATA */
let molaData = {};
const molaRef = doc(db, "kasa", "mola");

onSnapshot(molaRef, (snap)=>{
    molaData = snap.exists() ? snap.data().data : {};
});

/* MOLADA MI */
function moladaMi(isim){
    if(!isim) return false;

    let now = new Date();
    let gruplar = ["cay","yemek","son"];

    for(let g of gruplar){
        for(let i=1;i<=4;i++){

            let key = g+i;
            let saat = molaData[key]?.saat;
            let kisiler = molaData[key]?.kisiler || [];

            if(!saat) continue;

            let [h,m] = saat.split(":");

            let hedef = new Date();
            hedef.setHours(h,m,0);

            let sure = (molaData[g+"Sure"]?.sure || 15)*60;
            let fark = Math.floor((hedef-now)/1000);

            if(fark<=0 && fark>-sure){
                if(kisiler.map(x=>x.toLowerCase()).includes(isim.toLowerCase())){
                    return true;
                }
            }
        }
    }
    return false;
}

/* GİRİŞ */
window.giris = function(){

    const ref = doc(db, "kasa", "personel");

    onSnapshot(ref, (snap)=>{

        if(snap.exists()) personeller = snap.data().liste;

        let k = document.getElementById("kullanici").value.trim();
        let s = document.getElementById("sifre").value.trim();

        if(k === admin.k && s === admin.s){
            adminMi = true;

            document.getElementById("panelBtn").style.display="block";
            document.getElementById("mesajBtn").style.display="inline-block";
        }else{
            let bulundu = personeller.find(p=>p.k===k && p.s===s);
            if(!bulundu){ alert("Hatalı giriş"); return; }
        }

        document.getElementById("login").classList.add("hidden");
        document.getElementById("appDiv").classList.remove("hidden");

        olustur();
        listeGoster();
    });
}

/* PANEL */
window.panelToggle = function(){
    document.getElementById("panel").classList.toggle("acik");
}

/* KASA */
function olustur(){

    const ref = doc(db,"kasa","liste");

    onSnapshot(ref,(snap)=>{

        let kayit = snap.exists() ? snap.data().data : {};

        alan.innerHTML="";
        inputs=[];

        for(let i=0;i<6;i++){

            let div = document.createElement("div");
            div.className="kasa aktif";

            let i1=document.createElement("input");
            let i2=document.createElement("input");

            let k = kayit["kasa"+(i+1)];
            if(k){
                i1.value=k.sol;
                i2.value=k.sag;
            }

            if(!adminMi){
                i1.disabled=true;
                i2.disabled=true;
            }

            if(moladaMi(i1.value)) i1.classList.add("molada");
            if(moladaMi(i2.value)) i2.classList.add("molada");

            div.appendChild(i1);
            div.appendChild(i2);
            alan.appendChild(div);

            inputs.push(i1,i2);
        }

        if(adminMi){
            document.getElementById("kaydetBtn").style.display="block";
            document.getElementById("kaydirBtn").style.display="block";
            document.getElementById("degistirBtn").style.display="block";
        }
    });
}

/* KAYDET */
window.kaydet = async function(){
    let data={};
    for(let i=0;i<inputs.length;i+=2){
        data["kasa"+(i/2+1)]={sol:inputs[i].value,sag:inputs[i+1].value};
    }
    await setDoc(doc(db,"kasa","liste"),{data});
}

/* KAYDIR */
window.kaydir = async function(){
    let arr=[];
    for(let i=0;i<inputs.length;i+=2){
        arr.push({sol:inputs[i].value,sag:inputs[i+1].value});
    }
    let son=arr.pop();
    arr.unshift(son);

    arr.forEach((k,i)=>{
        inputs[i*2].value=k.sol;
        inputs[i*2+1].value=k.sag;
    });

    let data={};
    arr.forEach((k,i)=>data["kasa"+(i+1)]=k);
    await setDoc(doc(db,"kasa","liste"),{data});
}

/* DEĞİŞTİR */
window.degistir = async function(){
    for(let i=0;i<inputs.length;i+=2){
        let tmp=inputs[i].value;
        inputs[i].value=inputs[i+1].value;
        inputs[i+1].value=tmp;
    }
    kaydet();
}

/* PERSONEL EKLE */
window.ekle = async function(){
    let k=yeniK.value;
    let s=yeniS.value;
    personeller.push({k,s});
    await setDoc(doc(db,"kasa","personel"),{liste:personeller});
}

/* LİSTE */
function listeGoster(){
    let div=document.getElementById("liste");
    div.innerHTML="";

    personeller.forEach((p,i)=>{
        let d=document.createElement("div");
        d.innerHTML = p.k + " <button onclick='sil("+i+")'>❌</button>";
        div.appendChild(d);
    });
}

/* SİL */
window.sil = async function(i){
    personeller.splice(i,1);
    await setDoc(doc(db,"kasa","personel"),{liste:personeller});
}

</script>

</body>
</html>
