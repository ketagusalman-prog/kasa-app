<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasa Sistem</title>

<style>
body { font-family: Arial; background:#1e1e2f; color:white; text-align:center;}
.container { max-width:400px; margin:auto; position:relative; }

input {
    width:90%;
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#fff;
    color:#000;
    font-weight:bold;
}

button { padding:10px; margin:5px; border-radius:8px; border:none; background:#4CAF50; color:white;}

.kasa {
    display:flex;
    justify-content:space-between;
    margin:10px;
    padding:12px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#222;
    padding:20px;
    border-radius:10px;
    display:none;
    z-index:999;
}
</style>
</head>

<body>

<div class="container">

<h2>Kasa Sistem</h2>

<!-- 🔥 EXCEL YÜKLEME -->
<input type="file" id="excelInput" accept=".xlsx, .xls">

<div id="alan"></div>

</div>

<!-- 🔥 POPUP -->
<div id="popup" class="popup"></div>

<!-- 🔥 XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>

let excelData = [];
let kullanici = (localStorage.getItem("kullanici") || "").toLowerCase();
let adminMi = (kullanici === "admin");

/* 🔥 EXCEL OKUMA */
document.getElementById("excelInput").addEventListener("change", function(e){

    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(evt){
        let data = new Uint8Array(evt.target.result);
        let workbook = XLSX.read(data, {type: 'array'});

        let sheet = workbook.Sheets[workbook.SheetNames[0]];
        excelData = XLSX.utils.sheet_to_json(sheet);

        alert("Excel yüklendi");
    }

    reader.readAsArrayBuffer(file);
});

/* 🔥 TEST İÇİN SAHTE KASA OLUŞTUR (SENİN SİSTEMİNLE ÇAKIŞMAZ) */
let alan = document.getElementById("alan");

for(let i=1;i<=6;i++){

    let div = document.createElement("div");
    div.className = "kasa";

    let sol = document.createElement("input");
    let sag = document.createElement("input");

    sol.value = "ahmet";
    sag.value = "mehmet";

    div.appendChild(sol);
    div.appendChild(sag);

    /* 🔥 KASA TIKLAMA */
    div.onclick = () => kasaTikla([sol.value, sag.value]);

    alan.appendChild(div);
}

/* 🔥 KASA TIKLAMA FONKSİYONU */
function kasaTikla(isimler){

    let popup = document.getElementById("popup");
    popup.innerHTML = "";

    isimler.forEach(isim => {

        let kayit = excelData.find(x => 
            (x.isim || "").toLowerCase() === isim.toLowerCase()
        );

        if(!kayit) return;

        /* 🔥 PERSONEL KISITI */
        if(!adminMi && isim.toLowerCase() !== kullanici){
            return;
        }

        let div = document.createElement("div");
        div.innerHTML = `
            <b>${kayit.isim}</b><br>
            Tel: ${kayit.telefon || "-"}<br>
            Not: ${kayit.not || "-"}<hr>
        `;

        popup.appendChild(div);
    });

    popup.style.display = "block";

    popup.onclick = () => popup.style.display = "none";
}

</script>

</body>
</html>
