<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasa Sistem</title>

<style>
body {
    margin:0;
    background:#0f172a;
    font-family:"Segoe UI";
    display:flex;
    justify-content:center;
}

.container {
    width:360px;
    min-height:100vh;
    background:#020617;
    border-radius:25px;
    padding:15px;
    color:white;
}

.kasa {
    display:flex;
    gap:5px;
    margin:10px 0;
    padding:10px;
    border-radius:15px;
    background:#1e293b;
    position:relative;
}

.sayac {
    position:absolute;
    top:-8px;
    right:10px;
    background:black;
    color:#00ffcc;
    font-size:12px;
    padding:2px 6px;
    border-radius:8px;
}

@keyframes yanipSonme {
    0% { background:#8B0000; }
    50% { background:#ff0000; }
    100% { background:#8B0000; }
}

input.molada {
    animation: yanipSonme 1s infinite;
    color:#fff;
}

input.yaklasiyor {
    background:orange !important;
    color:black !important;
}

input {
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
}
</style>
</head>

<body>

<div class="container">
<div id="alan"></div>
</div>

<script>

let molaData = {
    yemek1:{saat:"12:00", kisiler:["ahmet"]},
    yemekSure:{sure:45}
};

function molaDurumu(isim){
    if(!isim) return null;

    let now = new Date();
    let gruplar = ["cay","yemek","son"];

    for(let g of gruplar){
        for(let i=1;i<=4;i++){

            let key = g+i;
            let saat = molaData[key]?.saat;
            let kisiler = molaData[key]?.kisiler || [];

            if(!saat) continue;
            if(!kisiler.includes(isim)) continue;

            let [h,m] = saat.split(":");
            let hedef = new Date();
            hedef.setHours(h,m,0);

            let sure = (g==="yemek"?45:15)*60;

            let fark = Math.floor((new Date() - hedef)/1000);

            if(fark >= 0 && fark < sure){
                return { durum:"molada", kalan: sure - fark };
            }

            if(fark < 0 && Math.abs(fark) <= 300){
                return { durum:"yaklasiyor", kalan: Math.abs(fark) };
            }
        }
    }
    return null;
}

function formatSure(s){
    let d=Math.floor(s/60);
    let sn=s%60;
    return d+":"+(sn<10?"0"+sn:sn);
}

function olustur(){
    let alan=document.getElementById("alan");
    alan.innerHTML="";

    let kisi="ahmet";

    let div=document.createElement("div");
    div.className="kasa";

    let input=document.createElement("input");
    input.value=kisi;

    let d=molaDurumu(kisi);

    if(d){
        if(d.durum==="molada") input.classList.add("molada");
        if(d.durum==="yaklasiyor") input.classList.add("yaklasiyor");

        let s=document.createElement("div");
        s.className="sayac";
        s.innerText=formatSure(d.kalan);
        div.appendChild(s);
    }

    div.appendChild(input);
    alan.appendChild(div);
}

setInterval(olustur,1000);
olustur();

</script>

</body>
</html>
