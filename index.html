<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasa Sistem</title>

<style>
body { font-family: Arial; background:#1e1e2f; color:white; text-align:center;}

.container {
    max-width:400px;
    margin:auto;
    position:relative;
}

/* 🔥 INPUT */
input {
    width:90%;
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#fff;
    color:#000;
    font-weight:bold;
}

input:disabled {
    background:#ddd;
}

/* 🔥 BUTTON */
button {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#4CAF50;
    color:white;
}

/* 🔥 KASA */
.kasa {
    display:flex;
    justify-content:space-between;
    margin:10px;
    padding:12px;
    border-radius:12px;
    font-weight:bold;
}

.erkek { background:linear-gradient(135deg,#2196F3,#0d47a1); }
.kadin { background:linear-gradient(135deg,#ff6ec7,#c2185b); }

.aktif {
    box-shadow:0 0 10px lime;
}

/* 🔥 MOLA */
@keyframes yanipSonme {
    0% { background:#8B0000; }
    50% { background:#ff0000; }
    100% { background:#8B0000; }
}

input.molada {
    animation: yanipSonme 1s infinite;
    color:#fff;
}

/* 🔥 PANEL */
.panel {
    background:#222;
    padding:10px;
    margin:10px;
    border-radius:10px;
    max-height:0;
    overflow:hidden;
    transition:0.4s;
}

.panel.acik {
    max-height:400px;
}

/* 🔥 ÜST BUTONLAR */
.ustButonlar {
    position:absolute;
    top:120px;
    right:-170px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

/* 🔥 EXCEL PANEL (SADECE KÖŞEDE) */
.excelPanel{
    position:fixed;
    bottom:10px;
    right:10px;
    background:#111;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 10px #000;
    z-index:999;
}

/* 🔥 HIDDEN */
.hidden { display:none; }

</style>
</head>

<body>

<div class="container">

<h2>Kasa Sistem</h2>

<div id="login">
<input id="kullanici" placeholder="Kullanıcı adı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş</button>
</div>

<div id="app" class="hidden">

<button onclick="window.location.href='mola.html'">☕ Mola</button>

<button id="panelBtn" onclick="panelToggle()" style="display:none;">👥 Personel</button>

<div class="ustButonlar">
<button id="kaydetBtn" onclick="kaydet()" style="display:none;">Kaydet</button>
<button id="kaydirBtn" onclick="kaydir()" style="display:none;">⬇️ Kaydır</button>
<button id="degistirBtn" onclick="degistir()" style="display:none;">↔️ Yer Değiştir</button>
<button onclick="window.location.href='kisisel.html'">👤 Kişisel</button>
</div>

<div id="alan"></div>

<div id="panel" class="panel">
<input id="yeniK" placeholder="Kullanıcı">
<input id="yeniS" placeholder="Şifre">
<button onclick="ekle()">Ekle</button>
<div id="liste"></div>
</div>

</div>
</div>

<!-- 🔥 EXCEL PANEL -->
<div id="excelPanel" class="excelPanel" style="display:none;">
📊 Excel Yükle
<input type="file" id="excelInput">
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
 apiKey: "AIzaSy...",
 authDomain: "ukasa1.firebaseapp.com",
 projectId: "ukasa1"
});

const db = getFirestore(app);

let admin = {k:"admin", s:"1234"};
let personeller = [];
let adminMi = false;
let inputs = [];
let alan = document.getElementById("alan");

/* 🔥 EXCEL */
let excelData = [];

document.getElementById("excelInput").addEventListener("change", e=>{
 let file = e.target.files[0];
 let reader = new FileReader();

 reader.onload = evt=>{
  let wb = XLSX.read(new Uint8Array(evt.target.result), {type:'array'});
  excelData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
  alert("Excel yüklendi");
 }

 reader.readAsArrayBuffer(file);
});

/* 🔥 GİRİŞ */
window.giris = function(){

 const ref = doc(db,"kasa","personel");

 onSnapshot(ref,snap=>{

  if(snap.exists()) personeller = snap.data().liste;

  let k = kullanici.value.trim();
  let s = sifre.value.trim();

  if(k===admin.k && s===admin.s){
   adminMi = true;
   panelBtn.style.display="block";
   excelPanel.style.display="block";
  }else{
   let ok = personeller.find(p=>p.k===k && p.s===s);
   if(!ok) return alert("Hatalı giriş");
  }

  login.classList.add("hidden");
  app.classList.remove("hidden");

  olustur();
 });

}

/* 🔥 PANEL */
window.panelToggle = ()=>panel.classList.toggle("acik");

/* 🔥 KASALAR */
function olustur(){

 const ref = doc(db,"kasa","liste");

 onSnapshot(ref,snap=>{

  let data = snap.exists()?snap.data().data:{};

  alan.innerHTML="";
  inputs=[];

  for(let i=0;i<6;i++){

   let d=document.createElement("div");
   d.className="kasa";

   let a=document.createElement("input");
   let b=document.createElement("input");

   let k=data["kasa"+(i+1)];
   if(k){a.value=k.sol; b.value=k.sag;}

   if(!adminMi){a.disabled=true; b.disabled=true;}

   d.appendChild(a);
   d.appendChild(b);
   alan.appendChild(d);

   inputs.push(a,b);
  }

  if(adminMi){
   kaydetBtn.style.display="block";
   kaydirBtn.style.display="block";
   degistirBtn.style.display="block";
  }

 });
}

/* 🔥 BUTONLAR */
window.kaydet = async ()=>{
 let d={};
 for(let i=0;i<inputs.length;i+=2){
  d["kasa"+(i/2+1)]={sol:inputs[i].value,sag:inputs[i+1].value};
 }
 await setDoc(doc(db,"kasa","liste"),{data:d});
}

window.kaydir = ()=>{
 let son=inputs.splice(inputs.length-2,2);
 inputs.unshift(...son);
 olustur();
}

window.degistir = ()=>{
 for(let i=0;i<inputs.length;i+=2){
  [inputs[i].value,inputs[i+1].value]=[inputs[i+1].value,inputs[i].value];
 }
}

/* 🔥 PERSONEL */
window.ekle = async ()=>{
 personeller.push({k:yeniK.value,s:yeniS.value});
 await setDoc(doc(db,"kasa","personel"),{liste:personeller});
}

</script>

</body>
</html>
