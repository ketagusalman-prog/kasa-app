<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasa Sistem</title>

<style>
body { font-family: Arial; background:#1e1e2f; color:white; text-align:center;}
.container { max-width:500px; margin:auto; }

input {
    width:90%;
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#fff;
    color:#000;
    font-weight:bold;
}

button {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#4CAF50;
    color:white;
}

.kasa {
    display:flex;
    justify-content:space-between;
    margin:10px;
    padding:12px;
    border-radius:12px;
    font-weight:bold;
}

.erkek { background:linear-gradient(135deg,#2196F3,#0d47a1); }
.kadin { background:linear-gradient(135deg,#ff6ec7,#c2185b); }

.aktif { box-shadow:0 0 10px lime; }

.hidden { display:none; }

.panel {
    background:#222;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

.mesajPanel {
    background:#111;
    padding:10px;
    margin:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Kasa Sistem</h2>

<div id="login">
<input id="kullanici" placeholder="Kullanıcı adı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş</button>
</div>

<div id="app" class="hidden">

<button onclick="window.location.href='mola.html'">☕ Mola</button>
<button onclick="window.location.href='kisisel.html'">👤 Kişisel Panel</button>

<button id="panelBtn" onclick="panelToggle()" style="display:none;">👥 Personel</button>
<button id="mesajBtn" onclick="mesajToggle()" style="display:none;">📩 Mesaj</button>

<div>
<button id="kaydetBtn" onclick="kaydet()" style="display:none;">Kaydet</button>
<button id="kaydirBtn" onclick="kaydir()" style="display:none;">Kaydır</button>
<button id="degistirBtn" onclick="degistir()" style="display:none;">Değiştir</button>
</div>

<div id="alan"></div>

<div id="panel" class="panel hidden">
<h4>Personel</h4>
<input id="yeniK">
<input id="yeniS">
<button onclick="ekle()">Ekle</button>
<div id="liste"></div>
</div>

<div id="mesajPanel" class="mesajPanel hidden">
<h4>📩 Mesaj Gönder</h4>

<div id="kisiSec"></div>

<input id="mesajText" placeholder="Mesaj yaz">

<button onclick="mesajGonder()">Gönder</button>
<button onclick="tumuneGonder()">Tümüne</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let admin = {k:"admin", s:"1234"};
let personeller = [];
let adminMi = false;
let inputs = [];
let alan = document.getElementById("alan");

/* GİRİŞ */
window.giris = function(){

    const ref = doc(db, "kasa", "personel");

    onSnapshot(ref, (snap)=>{

        if(snap.exists()) personeller = snap.data().liste;

        let k = document.getElementById("kullanici").value.trim();
        let s = document.getElementById("sifre").value.trim();

        if(k === admin.k && s === admin.s){
            adminMi = true;

            document.getElementById("panelBtn").style.display="block";
            document.getElementById("mesajBtn").style.display="block";
        }else{
            let bulundu = personeller.find(p=>p.k===k && p.s===s);
            if(!bulundu){ alert("Hatalı"); return; }
        }

        localStorage.setItem("kullanici",k);

        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");

        olustur();
        listeGoster();
    });
}

/* PANEL */
window.panelToggle = function(){
    document.getElementById("panel").classList.toggle("hidden");
}

window.mesajToggle = function(){
    document.getElementById("mesajPanel").classList.toggle("hidden");
    kisiListe();
}

/* KASA */
function olustur(){

    const ref = doc(db,"kasa","liste");

    onSnapshot(ref,(snap)=>{

        let kayit = snap.exists() ? snap.data().data : {};

        alan.innerHTML="";
        inputs=[];

        for(let i=0;i<6;i++){

            let div = document.createElement("div");
            div.className="kasa aktif";

            let i1=document.createElement("input");
            let i2=document.createElement("input");

            let k = kayit["kasa"+(i+1)];
            if(k){
                i1.value=k.sol;
                i2.value=k.sag;
            }

            if(!adminMi){
                i1.disabled=true;
                i2.disabled=true;
            }

            div.appendChild(i1);
            div.appendChild(i2);
            alan.appendChild(div);

            inputs.push(i1,i2);
        }

        if(adminMi){
            document.getElementById("kaydetBtn").style.display="block";
            document.getElementById("kaydirBtn").style.display="block";
            document.getElementById("degistirBtn").style.display="block";
        }

    });
}

/* KAYDET */
window.kaydet = async function(){
    let data={};
    for(let i=0;i<inputs.length;i+=2){
        data["kasa"+(i/2+1)]={sol:inputs[i].value,sag:inputs[i+1].value};
    }
    await setDoc(doc(db,"kasa","liste"),{data});
}

/* KAYDIR */
window.kaydir = async function(){
    let arr=[];
    for(let i=0;i<inputs.length;i+=2){
        arr.push({sol:inputs[i].value,sag:inputs[i+1].value});
    }
    let son=arr.pop();
    arr.unshift(son);

    arr.forEach((k,i)=>{
        inputs[i*2].value=k.sol;
        inputs[i*2+1].value=k.sag;
    });

    let data={};
    arr.forEach((k,i)=>data["kasa"+(i+1)]=k);
    await setDoc(doc(db,"kasa","liste"),{data});
}

/* DEĞİŞTİR */
window.degistir = async function(){
    for(let i=0;i<inputs.length;i+=2){
        let tmp=inputs[i].value;
        inputs[i].value=inputs[i+1].value;
        inputs[i+1].value=tmp;
    }
    kaydet();
}

/* PERSONEL */
window.ekle = async function(){
    let k=yeniK.value;
    let s=yeniS.value;
    personeller.push({k,s});
    await setDoc(doc(db,"kasa","personel"),{liste:personeller});
}

function listeGoster(){
    let div=document.getElementById("liste");
    div.innerHTML="";
    personeller.forEach((p)=>{
        let d=document.createElement("div");
        d.innerHTML=p.k;
        div.appendChild(d);
    });
}

/* KİŞİ SEÇ */
function kisiListe(){
    let div=document.getElementById("kisiSec");
    div.innerHTML="";
    personeller.forEach(p=>{
        let label=document.createElement("label");
        label.innerHTML=`<input type="checkbox" value="${p.k}"> ${p.k}`;
        div.appendChild(label);
        div.appendChild(document.createElement("br"));
    });
}

/* 🔥 MESAJ GÖNDER (GEÇMİŞLİ) */
window.mesajGonder = async function(){

    let msg = document.getElementById("mesajText").value;

    let secilen = [...document.querySelectorAll("#kisiSec input:checked")]
                    .map(x=>x.value);

    for(let kisi of secilen){

        let ref = doc(db,"mesajlar",kisi);

        onSnapshot(ref, async (snap)=>{

            let eski = snap.exists() ? snap.data().liste || [] : [];

            eski.push({
                text: msg,
                okundu:false,
                tarih: new Date().toISOString()
            });

            await setDoc(ref,{liste:eski});
        });
    }

    alert("Gönderildi");
}

/* 🔥 TÜMÜNE */
window.tumuneGonder = async function(){

    let msg = document.getElementById("mesajText").value;

    for(let p of personeller){

        let ref = doc(db,"mesajlar",p.k);

        onSnapshot(ref, async (snap)=>{

            let eski = snap.exists() ? snap.data().liste || [] : [];

            eski.push({
                text: msg,
                okundu:false,
                tarih: new Date().toISOString()
            });

            await setDoc(ref,{liste:eski});
        });
    }

    alert("Herkese gönderildi");
}

</script>

</body>
</html>
