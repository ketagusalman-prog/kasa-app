<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasa Sistemi</title>

<style>
body {
    font-family: Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
}

.container { max-width:1200px; margin:auto; }

/* 🔥 INPUT DÜZELTME */
input {
    background:#ffffff;
    color:#000000;
    font-weight:bold;
    padding:6px;
    margin:4px;
    border-radius:6px;
    border:none;
}

input:disabled {
    background:#dddddd;
    color:#000;
    opacity:1;
}

/* 🔥 GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
}

/* 🔥 KASA BLOK */
.kasa {
    background:#2a2a3d;
    padding:10px;
    border-radius:10px;
}

/* 🔴 MOLADA */
.molada {
    background:#8B0000 !important;
    box-shadow:0 0 15px red;
}

/* 🟢 AKTİF */
.aktifKasa {
    background:#2e7d32 !important;
    box-shadow:0 0 15px lime;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>Kasa Sistemi</h2>

<button onclick="window.location.href='mola.html'">☕ Mola</button>
<button onclick="cikis()">🚪 Çıkış</button>

<div id="alan" class="grid"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let alan = document.getElementById("alan");

const kasaRef = doc(db,"kasa","veriler");
const molaRef = doc(db,"kasa","mola");

let kasaData = {};
let molaData = {};

onSnapshot(kasaRef, (snap)=>{
    kasaData = snap.exists()? snap.data().data : {};
    render();
});

onSnapshot(molaRef, (snap)=>{
    molaData = snap.exists()? snap.data().data : {};
    render();
});

// 🔥 MOLA KONTROL
function moladaMi(isim){

    let now = new Date();
    let gruplar = ["cay","yemek","son"];

    for(let g of gruplar){
        for(let i=1;i<=4;i++){

            let key = g+i;

            let saat = molaData[key]?.saat;
            let kisiler = molaData[key]?.kisiler || [];

            if(!saat) continue;

            let [h,m]=saat.split(":");

            let hedef=new Date();
            hedef.setHours(h,m,0);

            let sure = (molaData[g+"Sure"]?.sure || 15)*60;

            let fark = Math.floor((hedef-now)/1000);

            let molada = (fark<=0 && fark>-sure);

            if(molada && kisiler.map(x=>x.toLowerCase()).includes(isim.toLowerCase())){
                return true;
            }
        }
    }

    return false;
}

// 🔥 EKRAN ÇİZ
function render(){

    alan.innerHTML="";

    Object.keys(kasaData).forEach(key=>{

        let isim = kasaData[key]?.isim || "";

        let div = document.createElement("div");
        div.className="kasa";

        let title = document.createElement("h3");
        title.innerText = key;
        div.appendChild(title);

        let inp = document.createElement("input");
        inp.value = isim;
        inp.disabled = true;
        div.appendChild(inp);

        let durum = document.createElement("div");

        if(isim && moladaMi(isim)){
            div.classList.add("molada");
            durum.innerText="Molada";
        }
        else{
            div.classList.add("aktifKasa");
            durum.innerText="Aktif";
        }

        div.appendChild(durum);

        alan.appendChild(div);

    });
}

// 🚪 ÇIKIŞ
window.cikis = function(){
    localStorage.removeItem("kullanici");
    location.reload();
}

</script>

</body>
</html>
