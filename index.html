<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasa Sistem</title>

<style>
body { font-family: Arial; background:#1e1e2f; color:white; text-align:center;}
.container { max-width:400px; margin:auto; position:relative; }

input {
    width:90%;
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#fff;
    color:#000;
    font-weight:bold;
}

input:disabled {
    background:#ddd;
    color:#000;
    opacity:1;
}

button { padding:10px; margin:5px; border-radius:8px; border:none; background:#4CAF50; color:white;}

.kasa {
    display:flex;
    justify-content:space-between;
    margin:10px;
    padding:12px;
    border-radius:12px;
    font-weight:bold;
}

.erkek { background:linear-gradient(135deg,#2196F3,#0d47a1); }
.kadin { background:linear-gradient(135deg,#ff6ec7,#c2185b); }

.molada {
    background:#8B0000 !important;
    box-shadow:0 0 10px red;
}

.aktif {
    box-shadow:0 0 10px lime;
}

.hidden { display:none; }
.panel { background:#222; padding:10px; margin:10px; border-radius:10px;}

/* 🔥 GÜNCELLENDİ */
.ustButonlar{
    position:absolute;
    top:40px;
    right:-70px;
    display:flex;
    flex-direction:column;
    gap:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Kasa Sistem</h2>

<div id="login">
<input id="kullanici" placeholder="Kullanıcı adı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş</button>
</div>

<div id="app" class="hidden">

<h3 id="info"></h3>

<button onclick="window.location.href='mola.html'">☕ Mola Sayfası</button>

<div class="ustButonlar">
<button id="kaydetBtn" onclick="kaydet()" style="display:none;">Kaydet</button>
<button id="kaydirBtn" onclick="kaydir()" style="display:none;">⬇️ Kaydır</button>
<button id="degistirBtn" onclick="degistir()" style="display:none;">↔️ Yer Değiştir</button>
</div>

<div id="alan"></div>

<div id="panel" class="panel hidden">
<h4>👥 Personel</h4>
<input id="yeniK" placeholder="Kullanıcı">
<input id="yeniS" placeholder="Şifre">
<button onclick="ekle()">Ekle</button>
<div id="liste"></div>
</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyChKcwZnw1fe_SFWy2dJA_JZOMiKghF5_o",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let admin = {k:"admin", s:"1234"};
let personeller = [];
let adminMi = false;
let inputs = [];
let alan = document.getElementById("alan");

let molaData = {};
const molaRef = doc(db, "kasa", "mola");
onSnapshot(molaRef, (snap)=>{
    molaData = snap.exists() ? snap.data().data : {};
});

function cinsiyet(isim){
    isim = (isim || "").toLowerCase();
    let kadin = ["ayşe","fatma","zeynep","elif","buse"];
    return kadin.includes(isim) ? "kadin" : "erkek";
}

function moladaMi(isim){
    if(!isim) return false;

    let now = new Date();
    let gruplar = ["cay","yemek","son"];

    for(let g of gruplar){
        for(let i=1;i<=4;i++){

            let key = g+i;
            let saat = molaData[key]?.saat;
            let kisiler = molaData[key]?.kisiler || [];

            if(!saat) continue;

            let [h,m] = saat.split(":");

            let hedef = new Date();
            hedef.setHours(h,m,0);

            let sure = (molaData[g+"Sure"]?.sure || 15)*60;
            let fark = Math.floor((hedef-now)/1000);

            if(fark<=0 && fark>-sure){
                if(kisiler.map(x=>x.toLowerCase()).includes(isim.toLowerCase())){
                    return true;
                }
            }
        }
    }
    return false;
}

window.giris = function() {

    const ref = doc(db, "kasa", "personel");

    onSnapshot(ref, (snap) => {

        if (snap.exists()) {
            personeller = snap.data().liste;
        }

        let k = document.getElementById("kullanici").value.trim();
        let s = document.getElementById("sifre").value.trim();

        if (k === admin.k && s === admin.s) {
            adminMi = true;
            document.getElementById("panel").classList.remove("hidden");
        } else {
            let bulundu = personeller.find(p => p.k === k && p.s === s);
            if (!bulundu) {
                alert("Hatalı giriş");
                return;
            }
        }

        localStorage.setItem("kullanici", k);

        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        document.getElementById("info").innerText = k;

        olustur();
        listeGoster();
    });
}

function olustur() {
    const ref = doc(db, "kasa", "liste");

    onSnapshot(ref, (snap) => {

        let kayit = snap.exists() ? snap.data().data : {};

        alan.innerHTML = "";
        inputs = [];

        for (let i = 0; i < 6; i++) {

            let div = document.createElement("div");
            div.className = "kasa";

            let i1 = document.createElement("input");
            let i2 = document.createElement("input");

            let k = kayit["kasa"+(i+1)];
            if (k) {
                i1.value = k.sol;
                i2.value = k.sag;
            }

            if (!adminMi) {
                i1.disabled = true;
                i2.disabled = true;
            }

            div.classList.add(cinsiyet(i1.value || i2.value));

            if(moladaMi(i1.value) || moladaMi(i2.value)){
                div.classList.add("molada");
            } else {
                div.classList.add("aktif");
            }

            div.appendChild(i1);
            div.appendChild(i2);
            alan.appendChild(div);

            inputs.push(i1, i2);
        }

        if (adminMi) {
            document.getElementById("kaydetBtn").style.display = "block";
            document.getElementById("kaydirBtn").style.display = "block";
            document.getElementById("degistirBtn").style.display = "block";
        }
    });
}

window.kaydet = async function() {
    if (!adminMi) return;

    let data = {};

    for (let i = 0; i < inputs.length; i+=2) {
        data["kasa"+(i/2+1)] = {
            sol: inputs[i].value,
            sag: inputs[i+1].value
        };
    }

    await setDoc(doc(db, "kasa", "liste"), {data});
}

window.kaydir = async function() {
    if (!adminMi) return;

    let yeni = [];

    for (let i = 0; i < inputs.length; i+=2) {
        yeni.push({
            sol: inputs[i].value,
            sag: inputs[i+1].value
        });
    }

    let son = yeni.pop();
    yeni.unshift(son);

    for (let i = 0; i < yeni.length; i++) {
        inputs[i*2].value = yeni[i].sol;
        inputs[i*2+1].value = yeni[i].sag;
    }

    let data = {};
    for (let i = 0; i < yeni.length; i++) {
        data["kasa"+(i+1)] = yeni[i];
    }

    await setDoc(doc(db, "kasa", "liste"), {data});
}

window.degistir = async function() {
    if (!adminMi) return;

    let yeni = [];

    for (let i = 0; i < inputs.length; i+=2) {
        yeni.push({
            sol: inputs[i].value,
            sag: inputs[i+1].value
        });
    }

    for (let i = 0; i < yeni.length; i++) {
        let temp = yeni[i].sol;
        yeni[i].sol = yeni[i].sag;
        yeni[i].sag = temp;
    }

    for (let i = 0; i < yeni.length; i++) {
        inputs[i*2].value = yeni[i].sol;
        inputs[i*2+1].value = yeni[i].sag;
    }

    let data = {};
    for (let i = 0; i < yeni.length; i++) {
        data["kasa"+(i+1)] = yeni[i];
    }

    await setDoc(doc(db, "kasa", "liste"), {data});
}

window.ekle = async function() {
    let k = document.getElementById("yeniK").value;
    let s = document.getElementById("yeniS").value;

    personeller.push({k,s});
    await setDoc(doc(db, "kasa", "personel"), {liste: personeller});
}

function listeGoster() {
    let div = document.getElementById("liste");
    div.innerHTML = "";

    personeller.forEach((p,i) => {
        let d = document.createElement("div");
        d.innerHTML = p.k + " <button onclick='sil("+i+")'>❌</button>";
        div.appendChild(d);
    });
}

window.sil = async function(i) {
    personeller.splice(i,1);
    await setDoc(doc(db, "kasa", "personel"), {liste: personeller});
}

</script>

</body>
</html>
