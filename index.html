<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasa Sistem</title>

<style>
body { font-family: Arial; background:#1e1e2f; color:white; text-align:center;}
.container { max-width:500px; margin:auto; }

input {
    width:90%;
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#fff;
    color:#000;
    font-weight:bold;
}

button {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#4CAF50;
    color:white;
}

.kasa {
    display:flex;
    justify-content:space-between;
    margin:10px;
    padding:12px;
    border-radius:12px;
    font-weight:bold;
}

.aktif { box-shadow:0 0 10px lime; }

.hidden { display:none; }

.panel { background:#222; padding:10px; margin:10px; border-radius:10px; }
.mesajPanel { background:#111; padding:10px; margin:10px; border-radius:10px; }
</style>
</head>

<body>

<div class="container">

<h2>Kasa Sistem</h2>

<div id="login">
<input id="kullanici" placeholder="Kullanıcı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş</button>
</div>

<div id="app" class="hidden">

<button onclick="window.location.href='mola.html'">☕ Mola</button>
<button onclick="window.location.href='kisisel.html'">👤 Kişisel Panel</button>

<button id="panelBtn" onclick="panelToggle()" style="display:none;">👥 Personel</button>
<button id="mesajBtn" onclick="mesajToggle()" style="display:none;">📩 Mesaj</button>

<div>
<button id="kaydetBtn" onclick="kaydet()" style="display:none;">Kaydet</button>
<button id="kaydirBtn" onclick="kaydir()" style="display:none;">Kaydır</button>
<button id="degistirBtn" onclick="degistir()" style="display:none;">Değiştir</button>
</div>

<div id="alan"></div>

<!-- PERSONEL PANEL -->
<div id="panel" class="panel hidden">
<h4>Personel</h4>
<input id="yeniK" placeholder="Kullanıcı">
<input id="yeniS" placeholder="Şifre">
<button onclick="ekle()">Ekle</button>
<div id="liste"></div>
</div>

<!-- MESAJ PANEL -->
<div id="mesajPanel" class="mesajPanel hidden">

<h4>📩 Mesaj Gönder</h4>

<div id="kisiSec"></div>

<input id="mesajText" placeholder="Mesaj yaz">

<label><input type="checkbox" id="onemli"> 📌 Önemli</label><br>

<input id="sureInput" type="number" placeholder="Süre (dk)">

<button onclick="mesajGonder()">Gönder</button>
<button onclick="tumuneGonder()">Tümüne</button>

</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let admin = {k:"admin", s:"1234"};
let personeller = [];
let adminMi = false;
let inputs = [];

const alan = document.getElementById("alan");

/* GİRİŞ */
window.giris = function(){

    const ref = doc(db, "kasa", "personel");

    onSnapshot(ref, (snap)=>{

        if(snap.exists()) personeller = snap.data().liste || [];

        let k = document.getElementById("kullanici").value.trim();
        let s = document.getElementById("sifre").value.trim();

        if(k === admin.k && s === admin.s){
            adminMi = true;
            panelBtn.style.display="block";
            mesajBtn.style.display="block";
        }else{
            let bulundu = personeller.find(p=>p.k===k && p.s===s);
            if(!bulundu){ alert("Hatalı"); return; }
        }

        localStorage.setItem("kullanici",k);

        login.classList.add("hidden");
        app.classList.remove("hidden");

        olustur();
        listeGoster();
    });
}

/* PANEL */
window.panelToggle = function(){
    panel.classList.toggle("hidden");
}

/* MESAJ PANEL */
window.mesajToggle = function(){
    mesajPanel.classList.toggle("hidden");
    kisiListe();
}

/* PERSONEL LİSTE */
function listeGoster(){

    let div = document.getElementById("liste");
    div.innerHTML="";

    personeller.forEach((p,i)=>{

        let d=document.createElement("div");

        d.innerHTML = `
            ${p.k}
            <button onclick="sil(${i})">❌</button>
        `;

        div.appendChild(d);
    });
}

/* PERSONEL SİL */
window.sil = async function(i){

    personeller.splice(i,1);

    await setDoc(doc(db,"kasa","personel"),{
        liste: personeller
    });
}

/* PERSONEL EKLE */
window.ekle = async function(){

    let k = yeniK.value;
    let s = yeniS.value;

    if(!k || !s) return;

    personeller.push({k,s});

    await setDoc(doc(db,"kasa","personel"),{
        liste: personeller
    });

    yeniK.value="";
    yeniS.value="";
}

/* KASA */
function olustur(){

    const ref = doc(db,"kasa","liste");

    onSnapshot(ref,(snap)=>{

        let kayit = snap.exists() ? snap.data().data : {};

        alan.innerHTML="";
        inputs=[];

        for(let i=0;i<6;i++){

            let div = document.createElement("div");
            div.className="kasa aktif";

            let i1=document.createElement("input");
            let i2=document.createElement("input");

            let k = kayit["kasa"+(i+1)];
            if(k){
                i1.value=k.sol;
                i2.value=k.sag;
            }

            if(!adminMi){
                i1.disabled=true;
                i2.disabled=true;
            }

            div.appendChild(i1);
            div.appendChild(i2);
            alan.appendChild(div);

            inputs.push(i1,i2);
        }

    });
}

/* KASA KAYDET */
window.kaydet = async function(){

    let data={};

    for(let i=0;i<inputs.length;i+=2){
        data["kasa"+(i/2+1)]={
            sol:inputs[i].value,
            sag:inputs[i+1].value
        };
    }

    await setDoc(doc(db,"kasa","liste"),{data});
}

/* KAYDIR */
window.kaydir = function(){
    alert("Kaydır aktif (isteğe bağlı geliştiririz)");
}

/* DEĞİŞTİR */
window.degistir = function(){
    alert("Değiştir aktif (isteğe bağlı geliştiririz)");
}

/* KİŞİ LİSTE */
function kisiListe(){

    let div = document.getElementById("kisiSec");
    div.innerHTML="";

    personeller.forEach(p=>{

        let label=document.createElement("label");

        label.innerHTML = `
            <input type="checkbox" value="${p.k}">
            ${p.k}
        `;

        div.appendChild(label);
        div.appendChild(document.createElement("br"));
    });
}

/* MESAJ GÖNDER */
window.mesajGonder = async function(){

    let msg = mesajText.value;
    let onemli = onemli.checked;
    let dk = parseInt(document.getElementById("sureInput").value || 0);

    let secilen = [...document.querySelectorAll("#kisiSec input:checked")]
                    .map(x=>x.value);

    for(let kisi of secilen){

        await setDoc(doc(db,"mesajlar",kisi),{
            text:msg,
            okundu:false,
            onemli:onemli,
            silme: dk ? Date.now() + (dk*60000) : null
        });
    }

    alert("Gönderildi");
}

/* TÜMÜNE */
window.tumuneGonder = async function(){

    let msg = mesajText.value;
    let dk = parseInt(document.getElementById("sureInput").value || 0);

    for(let p of personeller){

        await setDoc(doc(db,"mesajlar",p.k),{
            text:msg,
            okundu:false,
            silme: dk ? Date.now() + (dk*60000) : null
        });
    }

    alert("Herkese gönderildi");
}

</script>

</body>
</html>
