<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kasa Sistem</title>

<style>
body {
    font-family: Arial;
    background:#0b1020;
    color:white;
    margin:0;
}

/* FULL */
.container {
    width:100%;
    height:100dvh;
    position:relative;
    padding-top:60px;
    padding-bottom:70px;
    box-sizing:border-box;
}

/* APP BAR */
.appbar {
    position:fixed;
    top:0;
    width:100%;
    height:60px;
    background:#1f2937;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    z-index:10;
}

/* TAB BAR */
.tabbar {
    position:fixed;
    bottom:0;
    width:100%;
    height:70px;
    background:#1f2937;
    display:flex;
    justify-content:space-around;
    align-items:center;
    z-index:10;
}

/* 🔒 LOGINDE GİZLE */
#login:not(.hidden) ~ .tabbar {
    display:none;
}

/* LOGIN CARD */
#login {
    display:flex;
    justify-content:center;
    align-items:center;
    height:calc(100dvh - 60px);
}

.loginCard {
    width:85%;
    background:#1f2937;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.loginCard h2 {
    text-align:center;
    margin-bottom:20px;
}

/* INPUT */
input {
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:12px;
    border:none;
    font-weight:bold;
}

/* BUTTON */
button {
    width:100%;
    padding:14px;
    margin-top:10px;
    border-radius:12px;
    border:none;
    background:#22c55e;
    color:white;
    font-weight:bold;
}

/* KASA */
.kasa {
    display:flex;
    gap:10px;
    margin:10px;
    padding:14px;
    border-radius:16px;
}

.erkek { background:linear-gradient(135deg,#3b82f6,#1e3a8a); }
.kadin { background:linear-gradient(135deg,#ff6ec7,#c2185b); }

.aktif {
    box-shadow:0 0 12px lime;
}

/* MOLA */
@keyframes yanipSonme {
    0% { background:#8B0000; }
    50% { background:#ff0000; }
    100% { background:#8B0000; }
}

input.molada {
    background:#8B0000 !important;
    color:#fff !important;
    animation: yanipSonme 1s infinite;
}

.hidden { display:none; }

/* PANEL */
.panel {
    background:#1f2937;
    margin:10px;
    padding:10px;
    border-radius:16px;
    max-height:0;
    overflow:hidden;
    transition:0.4s;
}

.panel.acik {
    max-height:400px;
    overflow-y:auto;
}

/* FLOAT */
.ustButonlar {
    position:fixed;
    bottom:90px;
    right:15px;
    display:flex;
    flex-direction:column;
}

.ustButonlar button {
    width:50px;
    height:50px;
    border-radius:50%;
}

/* SCROLL */
#alan {
    overflow-y:auto;
    height:calc(100dvh - 160px);
}
</style>
</head>

<body>

<div class="appbar">Kasa Sistem</div>

<div class="container">

<!-- LOGIN -->
<div id="login">
<div class="loginCard">
<h2>Giriş Yap</h2>
<input id="kullanici" placeholder="Kullanıcı adı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş</button>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<button onclick="window.location.href='mola.html'">☕ Mola</button>
<button id="mesajBtn" onclick="window.location.href='mesaj.html'" style="display:none;">📩 Mesaj</button>
<button id="panelBtn" onclick="panelToggle()" style="display:none;">👥 Panel</button>

<div class="ustButonlar">
<button id="kaydetBtn" onclick="kaydet()" style="display:none;">💾</button>
<button id="kaydirBtn" onclick="kaydir()" style="display:none;">⬇️</button>
<button id="degistirBtn" onclick="degistir()" style="display:none;">↔️</button>
</div>

<div id="alan"></div>

<div id="panel" class="panel">
<h4>Personel</h4>
<input id="yeniK" placeholder="Kullanıcı">
<input id="yeniS" placeholder="Şifre">
<button onclick="ekle()">Ekle</button>
<div id="liste"></div>
</div>

</div>
</div>

<!-- TAB -->
<div class="tabbar">
<button onclick="window.location.reload()">🏠 Ana</button>
<button onclick="window.location.href='mola.html'">☕ Mola</button>
</div>

<script type="module">

/* 🔴 BURADAN SONRA JS AYNEN SENİN KOD */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let admin = {k:"admin", s:"1234"};
let personeller = [];
let adminMi = false;
let inputs = [];
let alan = document.getElementById("alan");

let molaData = {};
const molaRef = doc(db, "kasa", "mola");

onSnapshot(molaRef, (snap)=>{
    molaData = snap.exists() ? snap.data().data : {};
    if(!document.getElementById("app").classList.contains("hidden")){
        olustur();
    }
});

function cinsiyet(isim){
    isim = (isim || "").toLowerCase();
    let kadin = ["ayşe","fatma","zeynep","elif","buse"];
    return kadin.includes(isim) ? "kadin" : "erkek";
}

function moladaMi(isim){
    if(!isim) return false;

    let now = new Date();
    let gruplar = ["cay","yemek","son"];

    for(let g of gruplar){
        for(let i=1;i<=4;i++){
            let key = g+i;
            let saat = molaData[key]?.saat;
            let kisiler = molaData[key]?.kisiler || [];

            if(!saat) continue;

            let [h,m] = saat.split(":");
            let hedef = new Date();
            hedef.setHours(h,m,0);

            let sure = (molaData[g+"Sure"]?.sure || 15)*60;
            let fark = Math.floor((hedef-now)/1000);

            if(fark<=0 && fark>-sure){
                if(kisiler.map(x=>x.toLowerCase()).includes(isim.toLowerCase())){
                    return true;
                }
            }
        }
    }
    return false;
}

window.giris = function() {

    const ref = doc(db, "kasa", "personel");

    onSnapshot(ref, (snap) => {

        if (snap.exists()) {
            personeller = snap.data().liste;
        }

        let k = document.getElementById("kullanici").value.trim();
        let s = document.getElementById("sifre").value.trim();

        if (k === admin.k && s === admin.s) {
            adminMi = true;
            document.body.classList.add("admin");

            document.getElementById("panelBtn").style.display = "block";
            document.getElementById("mesajBtn").style.display = "block";
        } else {
            let bulundu = personeller.find(p => p.k === k && p.s === s);
            if (!bulundu) {
                alert("Hatalı giriş");
                return;
            }
        }

        localStorage.setItem("kullanici", k);

        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");

        olustur();
        listeGoster();
    });
}

/* geri kalan JS aynı */
</script>

</body>
</html>
