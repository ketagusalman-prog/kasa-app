<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasa Sistem</title>

<style>
body { font-family: Arial; background:#1e1e2f; color:white; text-align:center;}
.container { max-width:400px; margin:auto; position:relative; }

input {
    width:90%;
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#fff;
    color:#000;
    font-weight:bold;
}

input:disabled {
    background:#ddd;
    color:#000;
    opacity:1;
}

button { padding:10px; margin:5px; border-radius:8px; border:none; background:#4CAF50; color:white;}

.kasa {
    display:flex;
    justify-content:space-between;
    margin:10px;
    padding:12px;
    border-radius:12px;
    font-weight:bold;
}

.erkek { background:linear-gradient(135deg,#2196F3,#0d47a1); }
.kadin { background:linear-gradient(135deg,#ff6ec7,#c2185b); }

.aktif { box-shadow:0 0 10px lime; }

@keyframes yanipSonme {
    0% { background:#8B0000; }
    50% { background:#ff0000; }
    100% { background:#8B0000; }
}

input.molada {
    background:#8B0000 !important;
    color:#fff !important;
    animation: yanipSonme 1s infinite;
}

.hidden { display:none; }

.panel {
    background:#222;
    padding:10px;
    margin:10px;
    border-radius:10px;
    max-height:0;
    overflow:hidden;
    transition:all 0.4s ease;
}

.panel.acik {
    max-height:400px;
    overflow-y:auto;
}

.ustButonlar {
    position:absolute;
    top:120px;
    right:-180px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

/* 🔥 EXCEL PANEL */
.excelPanel{
    position:fixed;
    bottom:10px;
    right:10px;
    background:#111;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 10px #000;
    z-index:999;
}
</style>
</head>

<body>

<div class="container">

<h2>Kasa Sistem</h2>

<div id="login">
<input id="kullanici" placeholder="Kullanıcı adı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş</button>
</div>

<div id="app" class="hidden">

<button onclick="window.location.href='mola.html'">☕ Mola</button>
<button onclick="window.location.href='kisisel.html'">👤 Kişisel Panel</button>

<button id="panelBtn" onclick="panelToggle()" style="display:none;">👥 Personel</button>

<div class="ustButonlar">
<button id="kaydetBtn" onclick="kaydet()" style="display:none;">Kaydet</button>
<button id="kaydirBtn" onclick="kaydir()" style="display:none;">⬇️ Kaydır</button>
<button id="degistirBtn" onclick="degistir()" style="display:none;">↔️ Yer Değiştir</button>
</div>

<div id="alan"></div>

<div id="panel" class="panel">
<input id="yeniK">
<input id="yeniS">
<button onclick="ekle()">Ekle</button>
<div id="liste"></div>
</div>

</div>
</div>

<!-- 🔥 EXCEL PANEL -->
<div id="excelPanel" class="excelPanel" style="display:none;">
    <div>📊 Excel Yükle</div>
    <input type="file" id="excelInput">
</div>

<!-- XLSX -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseApp = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
});

const db = getFirestore(firebaseApp);

const kullaniciInput = document.getElementById("kullanici");
const sifreInput = document.getElementById("sifre");

let admin = {k:"admin", s:"1234"};
let personeller = [];
let adminMi = false;
let inputs = [];
let alan = document.getElementById("alan");

/* 🔥 EXCEL DATA */
let excelData = [];

document.getElementById("excelInput").addEventListener("change", function(e){
    let file = e.target.files[0];
    let reader = new FileReader();

    reader.onload = function(evt){
        let data = new Uint8Array(evt.target.result);
        let workbook = XLSX.read(data, {type: 'array'});
        let sheet = workbook.Sheets[workbook.SheetNames[0]];
        excelData = XLSX.utils.sheet_to_json(sheet);

        console.log(excelData);
        alert("Excel yüklendi");
    }

    reader.readAsArrayBuffer(file);
});

/* 🔥 GİRİŞ */
window.giris = function(){

    onSnapshot(doc(db,"kasa","personel"), snap=>{

        if(snap.exists()) personeller=snap.data().liste;

        let k = kullaniciInput.value.trim();
        let s = sifreInput.value.trim();

        if(k===admin.k && s===admin.s){
            adminMi=true;
            document.getElementById("panelBtn").style.display="block";

            // 🔥 EXCEL PANEL GÖSTER
            document.getElementById("excelPanel").style.display="block";

        }else{
            let f=personeller.find(p=>p.k===k && p.s===s);
            if(!f) return alert("Hatalı giriş");
        }

        localStorage.setItem("kullanici",k);

        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");

        olustur();
        listeGoster();
    });
}

/* 🔥 PANEL */
window.panelToggle=()=>document.getElementById("panel").classList.toggle("acik");

/* 🔥 KASA */
function olustur(){

    onSnapshot(doc(db,"kasa","liste"), snap=>{

        let data=snap.exists()?snap.data().data:{};

        alan.innerHTML="";
        inputs=[];

        for(let i=0;i<6;i++){

            let d=document.createElement("div");
            d.className="kasa";

            let i1=document.createElement("input");
            let i2=document.createElement("input");

            let k=data["kasa"+(i+1)];

            if(k){
                i1.value=k.sol;
                i2.value=k.sag;
            }

            if(!adminMi){
                i1.disabled=true;
                i2.disabled=true;
            }

            d.append(i1,i2);
            alan.appendChild(d);

            inputs.push(i1,i2);
        }

        if(adminMi){
            kaydetBtn.style.display="block";
            kaydirBtn.style.display="block";
            degistirBtn.style.display="block";
        }
    });
}

/* 🔥 KAYDET */
window.kaydet=async()=>{
    let data={};
    for(let i=0;i<inputs.length;i+=2){
        data["kasa"+(i/2+1)]={
            sol:inputs[i].value,
            sag:inputs[i+1].value
        };
    }
    await setDoc(doc(db,"kasa","liste"),{data});
}

/* 🔥 KAYDIR */
window.kaydir=async()=>{
    let arr=[];
    for(let i=0;i<inputs.length;i+=2){
        arr.push({sol:inputs[i].value,sag:inputs[i+1].value});
    }

    let son=arr.pop();
    arr.unshift(son);

    arr.forEach((k,i)=>{
        inputs[i*2].value=k.sol;
        inputs[i*2+1].value=k.sag;
    });

    let data={};
    arr.forEach((k,i)=>data["kasa"+(i+1)]=k);

    await setDoc(doc(db,"kasa","liste"),{data});
}

/* 🔥 DEĞİŞTİR */
window.degistir=async()=>{
    for(let i=0;i<inputs.length;i+=2){
        [inputs[i].value,inputs[i+1].value]=[inputs[i+1].value,inputs[i].value];
    }
    await kaydet();
}

/* 🔥 EKLE */
window.ekle=async()=>{
    personeller.push({k:yeniK.value,s:yeniS.value});
    await setDoc(doc(db,"kasa","personel"),{liste:personeller});
}

/* 🔥 LİSTE */
function listeGoster(){
    let div=document.getElementById("liste");
    div.innerHTML="";
    personeller.forEach((p,i)=>{
        let d=document.createElement("div");
        d.innerHTML=p.k+" <button onclick='sil("+i+")'>❌</button>";
        div.appendChild(d);
    });
}

/* 🔥 SİL */
window.sil=async(i)=>{
    personeller.splice(i,1);
    await setDoc(doc(db,"kasa","personel"),{liste:personeller});
}

</script>

</body>
</html>
