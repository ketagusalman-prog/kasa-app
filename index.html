<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasa Sistem</title>

<style>
body { font-family: Arial; background:#1e1e2f; color:white; text-align:center;}
.container { max-width:500px; margin:auto; }

input {
    width:90%;
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#fff;
    color:#000;
    font-weight:bold;
}

button {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#4CAF50;
    color:white;
}

.kasa {
    display:flex;
    justify-content:space-between;
    margin:10px;
    padding:12px;
    border-radius:12px;
    font-weight:bold;
}

.erkek { background:linear-gradient(135deg,#2196F3,#0d47a1); }
.kadin { background:linear-gradient(135deg,#ff6ec7,#c2185b); }

.aktif { box-shadow:0 0 10px lime; }

.hidden { display:none; }

.panel {
    background:#222;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

.mesajPanel {
    background:#111;
    padding:10px;
    margin:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Kasa Sistem</h2>

<div id="login">
<input id="kullanici" placeholder="Kullanıcı adı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş</button>
</div>

<div id="app" class="hidden">

<button onclick="window.location.href='mola.html'">☕ Mola</button>
<button onclick="window.location.href='kisisel.html'">👤 Kişisel Panel</button>

<button id="panelBtn" onclick="panelToggle()" style="display:none;">👥 Personel</button>
<button id="mesajBtn" onclick="mesajToggle()" style="display:none;">📩 Mesaj</button>

<div>
<button id="kaydetBtn" onclick="kaydet()" style="display:none;">Kaydet</button>
<button id="kaydirBtn" onclick="kaydir()" style="display:none;">Kaydır</button>
<button id="degistirBtn" onclick="degistir()" style="display:none;">Değiştir</button>
</div>

<div id="alan"></div>

<div id="panel" class="panel hidden">
<h4>Personel</h4>
<input id="yeniK">
<input id="yeniS">
<button onclick="ekle()">Ekle</button>
<div id="liste"></div>
</div>

<div id="mesajPanel" class="mesajPanel hidden">

<h4>📩 Mesaj Gönder</h4>

<div id="kisiSec"></div>

<input id="mesajText" placeholder="Mesaj yaz">

<label><input type="checkbox" id="onemli"> 📌 Önemli</label><br>
<label><input type="checkbox" id="sureli"> ⏳ 5 dk sonra sil</label><br>

<button onclick="mesajGonder()">Gönder</button>
<button onclick="tumuneGonder()">Tümüne</button>

</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let admin = {k:"admin", s:"1234"};
let personeller = [];
let adminMi = false;
let inputs = [];
let alan = document.getElementById("alan");

window.giris = function(){

    const ref = doc(db, "kasa", "personel");

    onSnapshot(ref, (snap)=>{

        if(snap.exists()) personeller = snap.data().liste;

        let k = document.getElementById("kullanici").value.trim();
        let s = document.getElementById("sifre").value.trim();

        if(k === admin.k && s === admin.s){
            adminMi = true;
            panelBtn.style.display="block";
            mesajBtn.style.display="block";
        }else{
            let bulundu = personeller.find(p=>p.k===k && p.s===s);
            if(!bulundu){ alert("Hatalı"); return; }
        }

        localStorage.setItem("kullanici",k);

        login.classList.add("hidden");
        appDiv.classList.remove("hidden");

        olustur();
        listeGoster();
    });
}

window.panelToggle = function(){
    panel.classList.toggle("hidden");
}

window.mesajToggle = function(){
    mesajPanel.classList.toggle("hidden");
    kisiListe();
}

function olustur(){

    const ref = doc(db,"kasa","liste");

    onSnapshot(ref,(snap)=>{

        let kayit = snap.exists() ? snap.data().data : {};

        alan.innerHTML="";
        inputs=[];

        for(let i=0;i<6;i++){

            let div = document.createElement("div");
            div.className="kasa aktif";

            let i1=document.createElement("input");
            let i2=document.createElement("input");

            let k = kayit["kasa"+(i+1)];
            if(k){
                i1.value=k.sol;
                i2.value=k.sag;
            }

            if(!adminMi){
                i1.disabled=true;
                i2.disabled=true;
            }

            div.appendChild(i1);
            div.appendChild(i2);
            alan.appendChild(div);

            inputs.push(i1,i2);
        }

        if(adminMi){
            kaydetBtn.style.display="block";
            kaydirBtn.style.display="block";
            degistirBtn.style.display="block";
        }

    });
}

/* 🔥 MESAJ GÖNDER */
window.mesajGonder = async function(){

    let msg = mesajText.value;
    let onemli = document.getElementById("onemli").checked;
    let sureli = document.getElementById("sureli").checked;

    let secilen = [...document.querySelectorAll("#kisiSec input:checked")]
                    .map(x=>x.value);

    let zaman = Date.now();

    for(let kisi of secilen){

        await setDoc(doc(db,"mesajlar",kisi),{
            text:msg,
            okundu:false,
            okuyanlar:[],
            onemli:onemli,
            zaman:zaman
        });

        if(sureli){
            setTimeout(async ()=>{
                await deleteDoc(doc(db,"mesajlar",kisi));
            }, 300000); // 5 dk
        }
    }

    alert("Gönderildi");
}

/* 🔥 TÜMÜNE */
window.tumuneGonder = async function(){

    let msg = mesajText.value;
    let onemli = document.getElementById("onemli").checked;
    let sureli = document.getElementById("sureli").checked;

    let zaman = Date.now();

    for(let p of personeller){

        await setDoc(doc(db,"mesajlar",p.k),{
            text:msg,
            okundu:false,
            okuyanlar:[],
            onemli:onemli,
            zaman:zaman
        });

        if(sureli){
            setTimeout(async ()=>{
                await deleteDoc(doc(db,"mesajlar",p.k));
            }, 300000);
        }
    }

    alert("Herkese gönderildi");
}

</script>

</body>
</html>
