<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kasa Sistem</title>

<style>
body { font-family: Arial; background:#1e1e2f; color:white; text-align:center;}
.container { max-width:400px; margin:auto; position:relative; }

input {
    width:90%;
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#fff;
    color:#000;
    font-weight:bold;
}

input:disabled {
    background:#ddd;
    color:#000;
}

button {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#4CAF50;
    color:white;
}

.kasa {
    display:flex;
    justify-content:space-between;
    margin:10px;
    padding:12px;
    border-radius:12px;
}

.erkek { background:linear-gradient(135deg,#2196F3,#0d47a1); }
.kadin { background:linear-gradient(135deg,#ff6ec7,#c2185b); }

input.molada {
    background:#8B0000 !important;
    color:#fff !important;
}

.hidden { display:none; }

.panel {
    background:#222;
    padding:10px;
    margin:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Kasa Sistem</h2>

<div id="login">
<input id="kullanici" placeholder="Kullanıcı adı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="giris()">Giriş</button>
</div>

<div id="app" class="hidden">

<button onclick="window.location.href='mola.html'">☕ Mola</button>
<button onclick="window.location.href='kisisel.html'">👤 Kişisel Panel</button>

<button id="panelBtn" onclick="panelToggle()" style="display:none;">👥 Personel</button>

<div id="alan"></div>

<!-- 🔥 PERSONEL PANEL -->
<div id="panel" class="panel hidden">
<h4>👥 Personel</h4>

<input id="yeniK" placeholder="Kullanıcı">
<input id="yeniS" placeholder="Şifre">
<button onclick="ekle()">Ekle</button>

<div id="liste"></div>
</div>

<!-- 🔥 MESAJ PANEL -->
<div id="mesajPanel" class="panel hidden">
<h4>📨 Mesaj Gönder</h4>

<input id="mesajInput" placeholder="Mesaj yaz">

<button onclick="mesajGonder()">Gönder</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, doc, setDoc, onSnapshot,
  collection, addDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let admin = {k:"admin", s:"1234"};
let personeller = [];
let adminMi = false;
let alan = document.getElementById("alan");

window.giris = function(){

    const ref = doc(db, "kasa", "personel");

    onSnapshot(ref, (snap)=>{

        if(snap.exists()){
            personeller = snap.data().liste;
        }

        let k = document.getElementById("kullanici").value.trim();
        let s = document.getElementById("sifre").value.trim();

        if(k === admin.k && s === admin.s){
            adminMi = true;

            document.getElementById("panelBtn").style.display="block";
            document.getElementById("mesajPanel").classList.remove("hidden");
        }
        else{
            let bulundu = personeller.find(p=>p.k===k && p.s===s);
            if(!bulundu){
                alert("Hatalı giriş");
                return;
            }
        }

        localStorage.setItem("kullanici", k);

        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");

        olustur();
        listeGoster();
    });
}

/* 🔥 PERSONEL PANEL */
window.panelToggle = function(){
    document.getElementById("panel").classList.toggle("hidden");
}

/* 🔥 KASALAR */
function olustur(){

    const ref = doc(db, "kasa", "liste");

    onSnapshot(ref, (snap)=>{

        let kayit = snap.exists() ? snap.data().data : {};

        alan.innerHTML="";

        for(let i=0;i<6;i++){

            let div = document.createElement("div");
            div.className="kasa";

            let i1 = document.createElement("input");
            let i2 = document.createElement("input");

            let k = kayit["kasa"+(i+1)];

            if(k){
                i1.value = k.sol;
                i2.value = k.sag;
            }

            if(!adminMi){
                i1.disabled = true;
                i2.disabled = true;
            }

            div.appendChild(i1);
            div.appendChild(i2);
            alan.appendChild(div);
        }
    });
}

/* 🔥 PERSONEL LİSTE + CHECKBOX */
function listeGoster(){

    let div = document.getElementById("liste");
    div.innerHTML="";

    personeller.forEach(p=>{

        let d = document.createElement("div");

        d.innerHTML = `
            <label>
                <input type="checkbox" class="kisiCheck" value="${p.k}">
                ${p.k}
            </label>
        `;

        div.appendChild(d);
    });
}

/* 🔥 PERSONEL EKLE */
window.ekle = async function(){

    let k = document.getElementById("yeniK").value;
    let s = document.getElementById("yeniS").value;

    personeller.push({k,s});

    await setDoc(doc(db,"kasa","personel"),{liste:personeller});
}

/* 🔥 MESAJ GÖNDER */
window.mesajGonder = async function(){

    let mesaj = document.getElementById("mesajInput").value.trim();

    if(!mesaj){
        alert("Mesaj boş");
        return;
    }

    let secilenler = document.querySelectorAll(".kisiCheck:checked");

    if(secilenler.length === 0){
        alert("Kişi seç");
        return;
    }

    for(let c of secilenler){

        await addDoc(collection(db,"mesajlar"),{
            kime: c.value.toLowerCase(),
            mesaj: mesaj,
            okundu:false,
            tarih:Date.now()
        });
    }

    alert("Gönderildi");
}

</script>

</body>
</html>
