<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mola Sistemi</title>

<style>
body { font-family: Arial; background:#1e1e2f; color:white; text-align:center;}
.container { max-width:1000px; margin:auto; }

.baslik {
    margin-top:25px;
    font-size:20px;
    font-weight:bold;
}

.grid {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.blok {
    background:#333;
    margin:10px;
    padding:10px;
    border-radius:10px;
    width:200px;
}

input {
    padding:6px;
    margin:3px;
    border-radius:6px;
    border:none;
    font-size:12px;
}

.sureInput {
    width:60px;
}

.kisiInput {
    width:90%;
}

button {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#4CAF50;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>☕ Mola Sistemi</h2>

<button onclick="window.location.href='index.html'">⬅️ Kasa</button>

<div id="alan"></div>

<button id="kaydetBtn" onclick="kaydet()" style="display:none;">Kaydet</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyChKcwZnw1fe_SFWy2dJA_JZOMiKghF5_o",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let kullanici = localStorage.getItem("kullanici");
let adminMi = (kullanici === "admin");

let alan = document.getElementById("alan");
let inputs = [];

const ref = doc(db, "kasa", "mola");

onSnapshot(ref, (snap) => {

    let data = snap.exists() ? snap.data().data : {};

    alan.innerHTML = "";
    inputs = [];

    alan.appendChild(baslik("caySure","☕ Çay Molası", data));
    alan.appendChild(gridOlustur("cay", 4, data, "caySure"));

    alan.appendChild(baslik("yemekSure","🍽️ Yemek Molası", data));
    alan.appendChild(gridOlustur("yemek", 4, data, "yemekSure"));

    alan.appendChild(baslik("sonSure","🕓 Son Mola", data));
    alan.appendChild(gridOlustur("son", 4, data, "sonSure"));

    if (adminMi) {
        document.getElementById("kaydetBtn").style.display = "block";
    }
});

// 🔥 BAŞLIK + SÜRE
function baslik(key, text, data) {

    let d = document.createElement("div");
    d.className = "baslik";

    let span = document.createElement("span");
    span.innerText = text + " ";
    d.appendChild(span);

    let sureInput = document.createElement("input");
    sureInput.type = "number";
    sureInput.className = "sureInput";
    sureInput.placeholder = "dk";
    sureInput.value = data[key]?.sure || "";

    if (!adminMi) sureInput.disabled = true;

    d.appendChild(sureInput);
    inputs.push(sureInput);

    return d;
}

// 🔥 GRID
function gridOlustur(prefix, adet, data, sureKey) {

    let grid = document.createElement("div");
    grid.className = "grid";

    for (let i = 1; i <= adet; i++) {
        grid.appendChild(blokOlustur(prefix+i, i + ". Grup", data, sureKey));
    }

    return grid;
}

// 🔥 BLOK
function blokOlustur(key, titleText, data, sureKey) {

    let blok = document.createElement("div");
    blok.className = "blok";

    let title = document.createElement("h4");
    title.innerText = titleText;
    blok.appendChild(title);

    let saat = document.createElement("input");
    saat.type = "time";
    saat.value = data[key]?.saat || "";

    if (!adminMi) saat.disabled = true;

    blok.appendChild(saat);
    inputs.push(saat);

    let kisiler = [];

    for (let j = 0; j < 6; j++) {
        let inp = document.createElement("input");
        inp.className = "kisiInput";
        inp.value = data[key]?.kisiler?.[j] || "";

        if (!adminMi) inp.disabled = true;

        blok.appendChild(inp);
        inputs.push(inp);
        kisiler.push(inp);
    }

    let sayac = document.createElement("div");
    blok.appendChild(sayac);

    setInterval(() => {

        if (!saat.value) return;

        let aktifKullanici = (localStorage.getItem("kullanici") || "").toLowerCase();

        let grupKisiler = kisiler.map(k => k.value.toLowerCase().trim());

        let dk = parseInt(data[sureKey]?.sure || 15);
        let molaSuresi = dk * 60;

        let simdi = new Date();
        let [h, m] = saat.value.split(":");

        let hedef = new Date();
        hedef.setHours(h, m, 0);

        let fark = Math.floor((hedef - simdi) / 1000);

        let benimMola = grupKisiler.includes(aktifKullanici);

        // 🔴 BAŞLADI
        if (fark <= 0 && fark > -molaSuresi) {

            blok.style.background = "#8B0000";

            let kalan = molaSuresi + fark;
            let dk2 = Math.floor(kalan / 60);
            let sn = kalan % 60;

            sayac.innerText = "Mola: " + dk2 + "dk " + sn + "sn";

            if (!blok.basladi) {

                if (benimMola) {
                    alert("Molan başladı!");

                    if (navigator.vibrate) {
                        navigator.vibrate([300,200,300,200,500]);
                    }
                }

                blok.basladi = true;
            }
        }

        // ✅ BİTTİ
        else if (fark <= -molaSuresi) {

            blok.style.background = "#2e7d32";
            sayac.innerText = "Mola bitti";

            if (!blok.bitti) {

                if (benimMola) {
                    alert("Molan bitti!");

                    if (navigator.vibrate) {
                        navigator.vibrate([500,200,500]);
                    }
                }

                blok.bitti = true;
            }
        }

        else {
            blok.style.background = "#333";
            sayac.innerText = "";
            blok.basladi = false;
            blok.bitti = false;
        }

    }, 1000);

    return blok;
}

// 💾 KAYDET
window.kaydet = async function() {

    if (!adminMi) return;

    let data = {};
    let index = 0;

    // süreler
    data["caySure"] = { sure: inputs[index++].value };
    data["yemekSure"] = { sure: inputs[index++].value };
    data["sonSure"] = { sure: inputs[index++].value };

    let gruplar = ["cay","yemek","son"];

    for (let g of gruplar) {
        for (let i = 1; i <= 4; i++) {

            let saat = inputs[index++].value;
            let kisiler = [];

            for (let j = 0; j < 6; j++) {
                kisiler.push(inputs[index++].value);
            }

            data[g+i] = { saat, kisiler };
        }
    }

    await setDoc(doc(db, "kasa", "mola"), {data});
    alert("Kaydedildi");
}

</script>

</body>
</html>
