<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mola Sistemi</title>

<style>
body { font-family: Arial; background:#1e1e2f; color:white; text-align:center;}
.container { max-width:500px; margin:auto; }

.blok {
    background:#333;
    margin:15px;
    padding:15px;
    border-radius:10px;
}

.baslik {
    margin-top:25px;
    font-size:20px;
    font-weight:bold;
}

input {
    width:90%;
    padding:8px;
    margin:5px;
    border-radius:8px;
    border:none;
}

button {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#4CAF50;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>☕ Mola Sistemi</h2>

<button onclick="window.location.href='index.html'">⬅️ Kasa</button>

<div id="alan"></div>

<button id="kaydetBtn" onclick="kaydet()" style="display:none;">Kaydet</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyChKcwZnw1fe_SFWy2dJA_JZOMiKghF5_o",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔐 USER
let kullanici = localStorage.getItem("kullanici");
let adminMi = (kullanici === "admin");

let alan = document.getElementById("alan");
let inputs = [];

// 🔥 VERİ
const ref = doc(db, "kasa", "mola");

onSnapshot(ref, (snap) => {

    let data = snap.exists() ? snap.data().data : {};

    alan.innerHTML = "";
    inputs = [];

    // ☕ ÇAY MOLASI
    let baslik1 = document.createElement("div");
    baslik1.className = "baslik";
    baslik1.innerText = "☕ Çay Molası";
    alan.appendChild(baslik1);

    for (let i = 1; i <= 3; i++) {
        blokOlustur("cay"+i, i + ". Grup", data);
    }

    // 🍽️ YEMEK MOLASI
    let baslik2 = document.createElement("div");
    baslik2.className = "baslik";
    baslik2.innerText = "🍽️ Yemek Molası";
    alan.appendChild(baslik2);

    for (let i = 1; i <= 4; i++) {
        blokOlustur("yemek"+i, i + ". Grup", data);
    }

    if (adminMi) {
        document.getElementById("kaydetBtn").style.display = "block";
    }
});

// 🔧 BLOK OLUŞTUR
function blokOlustur(key, titleText, data) {

    let blok = document.createElement("div");
    blok.className = "blok";

    let title = document.createElement("h3");
    title.innerText = titleText;
    blok.appendChild(title);

    // ⏰ SAAT
    let saat = document.createElement("input");
    saat.placeholder = "Saat";
    saat.value = data[key]?.saat || "";

    if (!adminMi) saat.disabled = true;

    blok.appendChild(saat);
    inputs.push(saat);

    // 👥 6 KİŞİ
    for (let j = 0; j < 6; j++) {
        let inp = document.createElement("input");
        inp.placeholder = "İsim";
        inp.value = data[key]?.kisiler?.[j] || "";

        if (!adminMi) inp.disabled = true;

        blok.appendChild(inp);
        inputs.push(inp);
    }

    alan.appendChild(blok);
}

// 💾 KAYDET
window.kaydet = async function() {

    if (!adminMi) return;

    let data = {};
    let index = 0;

    // ☕ ÇAY
    for (let i = 1; i <= 3; i++) {
        let saat = inputs[index++].value;
        let kisiler = [];

        for (let j = 0; j < 6; j++) {
            kisiler.push(inputs[index++].value);
        }

        data["cay"+i] = { saat, kisiler };
    }

    // 🍽️ YEMEK
    for (let i = 1; i <= 4; i++) {
        let saat = inputs[index++].value;
        let kisiler = [];

        for (let j = 0; j < 6; j++) {
            kisiler.push(inputs[index++].value);
        }

        data["yemek"+i] = { saat, kisiler };
    }

    await setDoc(doc(db, "kasa", "mola"), {data});
    alert("Kaydedildi");
}

</script>

</body>
</html>
