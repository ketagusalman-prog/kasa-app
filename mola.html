<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mola Sistemi</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b1020;
    color:white;
}

/* GENEL */
.container {
    padding:10px;
}

/* BAŞLIK */
h2 {
    text-align:center;
    margin:10px 0;
}

/* BLOKLAR */
.grup {
    background:#1f2937;
    margin:10px 0;
    padding:10px;
    border-radius:12px;
}

.grup h3 {
    margin:5px 0;
}

/* KUTULAR */
.kutu {
    background:#111827;
    padding:10px;
    border-radius:10px;
    margin:6px 0;
}

/* BÜYÜK SAYAÇ */
.sayac {
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    text-align:center;
    font-size:40px;
    font-weight:bold;
    padding:15px;
    color:#22c55e;
}

/* AKTİF */
.aktif {
    background:#ff0000 !important;
}
</style>
</head>

<body>

<div class="container">

<h2>☕ Çay Molası</h2>
<div id="cay"></div>

<h2>🍽 Yemek Molası</h2>
<div id="yemek"></div>

<h2>💤 Son Mola</h2>
<div id="son"></div>

</div>

<div class="sayac" id="sayac">--:--</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"ukasa1.firebaseapp.com",
  projectId:"ukasa1"
});

const db = getFirestore(app);

/* AKTİF KULLANICI */
let aktifKullanici = localStorage.getItem("kullanici");

/* MOLA DATA */
let molaData = {};
onSnapshot(doc(db,"kasa","mola"), snap=>{
    molaData = snap.exists()?snap.data().data:{};
    ciz();
});

/* ÇİZ */
function ciz(){

    ["cay","yemek","son"].forEach(tip=>{
        let div = document.getElementById(tip);
        div.innerHTML="";

        for(let i=1;i<=4;i++){

            let key = tip+i;
            let data = molaData[key] || {};

            let box = document.createElement("div");
            box.className="kutu";

            let kisiler = (data.kisiler || []).join(", ");
            let saat = data.saat || "--:--";

            box.innerHTML = `
                <b>${tip.toUpperCase()} ${i}</b><br>
                🕒 ${saat}<br>
                👤 ${kisiler}
            `;

            /* AKTİF MOLA */
            if(kisiler.toLowerCase().includes((aktifKullanici||"").toLowerCase())){
                if(aktifMi(saat, tip)){
                    box.classList.add("aktif");
                }
            }

            div.appendChild(box);
        }
    });

    sayacBaslat();
}

/* AKTİF KONTROL */
function aktifMi(saat, tip){
    if(!saat) return false;

    let now = new Date();
    let [h,m]=saat.split(":");

    let hedef=new Date();
    hedef.setHours(h,m,0);

    let sure=(molaData[tip+"Sure"]?.sure||15)*60;
    let fark=(hedef-now)/1000;

    return fark<=0 && fark>-sure;
}

/* SAYAÇ */
function sayacBaslat(){

    let aktifSaat=null;
    let aktifSure=0;

    ["cay","yemek","son"].forEach(tip=>{
        for(let i=1;i<=4;i++){
            let key=tip+i;
            let data=molaData[key];

            if(!data) continue;

            let kisiler=(data.kisiler||[]);
            if(!kisiler.map(x=>x.toLowerCase()).includes((aktifKullanici||"").toLowerCase())) continue;

            let saat=data.saat;
            if(!saat) continue;

            if(aktifMi(saat,tip)){
                aktifSaat=saat;
                aktifSure=(molaData[tip+"Sure"]?.sure||15)*60;
            }
        }
    });

    if(!aktifSaat){
        document.getElementById("sayac").innerText="--:--";
        return;
    }

    setInterval(()=>{
        let now=new Date();
        let [h,m]=aktifSaat.split(":");

        let hedef=new Date();
        hedef.setHours(h,m,0);

        let gecen=(now-hedef)/1000;
        let kalan=Math.max(0,aktifSure-gecen);

        let dk=Math.floor(kalan/60);
        let sn=Math.floor(kalan%60);

        document.getElementById("sayac").innerText =
            String(dk).padStart(2,"0")+":"+String(sn).padStart(2,"0");

    },1000);
}

</script>

</body>
</html>
