<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mola Sistemi</title>

<style>
body {
    margin:0;
    background:linear-gradient(135deg,#0f172a,#020617);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:"Segoe UI";
}

.phone {
    width:390px;
    height:800px;
    background:black;
    border-radius:35px;
    padding:10px;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
}

.app {
    width:100%;
    height:100%;
    background:#020617;
    border-radius:25px;
    overflow-y:auto;
    color:white;
    padding:15px;
    padding-bottom:90px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:8px;
}

.blok {
    background:#1e293b;
    padding:8px;
    border-radius:12px;
}

.aktif {
    background:#8B0000 !important;
}

.buyukSayac {
    position:fixed;
    bottom:15px;
    left:50%;
    transform:translateX(-50%);
    width:320px;
    background:black;
    text-align:center;
    font-size:28px;
    font-weight:bold;
    padding:10px;
    color:#22c55e;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="phone">
<div class="app">
<div id="alan"></div>
</div>

<div id="buyukSayac" class="buyukSayac">--:--</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSy...",
 projectId:"ukasa1"
});

const db = getFirestore(app);

let kullanici = (localStorage.getItem("kullanici") || "").toLowerCase();
let alan = document.getElementById("alan");
let state = {};

onSnapshot(doc(db,"kasa","mola"), snap=>{
    state = snap.exists()?snap.data().data:{};
    ciz();
});

function ciz(){
    alan.innerHTML="";

    ["cay","yemek","son"].forEach(g=>{
        let grid = document.createElement("div");
        grid.className="grid";

        for(let i=1;i<=4;i++){
            grid.appendChild(blok(g+i,g+"Sure"));
        }

        alan.appendChild(grid);
    });
}

function blok(key,sureKey){

    let b=document.createElement("div");
    b.className="blok";

    let sayac=document.createElement("div");
    b.appendChild(sayac);

    setInterval(()=>{

        let data=state[key];
        if(!data || !data.saat) return;

        let dk=parseInt(state[sureKey]?.sure||15);
        let sure=dk*60;

        let now=new Date();
        let [h,m]=data.saat.split(":");

        let hedef=new Date();
        hedef.setHours(h,m,0);

        let fark=(hedef-now)/1000;

        if(fark<=0 && fark>-sure){

            b.classList.add("aktif");

            let kalan=sure+fark;

            let d=Math.floor(kalan/60);
            let s=Math.floor(kalan%60);

            let text =
                String(d).padStart(2,"0")+":"+
                String(s).padStart(2,"0");

            sayac.innerText=text;

        }else{
            b.classList.remove("aktif");
            sayac.innerText="";
        }

    },1000);

    return b;
}

/* 🔥 TEK GLOBAL BÜYÜK SAYAÇ */
setInterval(()=>{

    let bulundu=false;

    ["cay","yemek","son"].forEach(g=>{
        for(let i=1;i<=4;i++){

            let key=g+i;
            let d=state[key];

            if(!d || !d.saat) continue;

            let kisiler=(d.kisiler||[]).map(x=>x.toLowerCase());
            if(!kisiler.includes(kullanici)) continue;

            let dk=parseInt(state[g+"Sure"]?.sure||15);
            let sure=dk*60;

            let now=new Date();
            let [h,m]=d.saat.split(":");

            let hedef=new Date();
            hedef.setHours(h,m,0);

            let fark=Math.floor((hedef-now)/1000);

            if(fark<=0 && fark>-sure){

                let kalan=sure+fark;

                let dkk=Math.floor(kalan/60);
                let sn=kalan%60;

                let text =
                    String(dkk).padStart(2,"0")+":"+
                    String(sn).padStart(2,"0");

                document.getElementById("buyukSayac").innerText=text;

                bulundu=true;
            }
        }
    });

    if(!bulundu){
        document.getElementById("buyukSayac").innerText="--:--";
    }

},1000);

</script>

</body>
</html>
