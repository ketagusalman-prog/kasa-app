<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mola Sistemi</title>

<style>
body { font-family: Arial; background:#1e1e2f; color:white; text-align:center;}
.container { max-width:1000px; margin:auto; }

.baslik {
    margin-top:25px;
    font-size:20px;
    font-weight:bold;
}

/* 🔥 ORTAK GRID */
.grid {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

/* 🔥 TÜM BLOKLAR AYNI */
.blok {
    background:#333;
    margin:10px;
    padding:10px;
    border-radius:10px;
    width:200px;
}

input {
    width:90%;
    padding:6px;
    margin:3px;
    border-radius:6px;
    border:none;
    font-size:12px;
}

button {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#4CAF50;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>☕ Mola Sistemi</h2>

<button onclick="window.location.href='index.html'">⬅️ Kasa</button>

<div id="alan"></div>

<button id="kaydetBtn" onclick="kaydet()" style="display:none;">Kaydet</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyChKcwZnw1fe_SFWy2dJA_JZOMiKghF5_o",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔐 USER
let kullanici = localStorage.getItem("kullanici");
let adminMi = (kullanici === "admin");

let alan = document.getElementById("alan");
let inputs = [];

// 🔥 VERİ
const ref = doc(db, "kasa", "mola");

onSnapshot(ref, (snap) => {

    let data = snap.exists() ? snap.data().data : {};

    alan.innerHTML = "";
    inputs = [];

    // ☕ ÇAY
    alan.appendChild(baslik("☕ Çay Molası"));
    alan.appendChild(gridOlustur("cay", 4, data));

    // 🍽️ YEMEK
    alan.appendChild(baslik("🍽️ Yemek Molası"));
    alan.appendChild(gridOlustur("yemek", 4, data));

    // 🕓 SON MOLA
    alan.appendChild(baslik("🕓 Son Mola"));
    alan.appendChild(gridOlustur("son", 4, data));

    if (adminMi) {
        document.getElementById("kaydetBtn").style.display = "block";
    }
});

// 🔧 BAŞLIK
function baslik(text) {
    let d = document.createElement("div");
    d.className = "baslik";
    d.innerText = text;
    return d;
}

// 🔧 GRID
function gridOlustur(prefix, adet, data) {

    let grid = document.createElement("div");
    grid.className = "grid";

    for (let i = 1; i <= adet; i++) {
        grid.appendChild(blokOlustur(prefix+i, i + ". Grup", data));
    }

    return grid;
}

// 🔧 BLOK
function blokOlustur(key, titleText, data) {

    let blok = document.createElement("div");
    blok.className = "blok";

    let title = document.createElement("h4");
    title.innerText = titleText;
    blok.appendChild(title);

    let saat = document.createElement("input");
    saat.placeholder = "Saat";
    saat.value = data[key]?.saat || "";

    if (!adminMi) saat.disabled = true;

    blok.appendChild(saat);
    inputs.push(saat);

    for (let j = 0; j < 6; j++) {
        let inp = document.createElement("input");
        inp.placeholder = "İsim";
        inp.value = data[key]?.kisiler?.[j] || "";

        if (!adminMi) inp.disabled = true;

        blok.appendChild(inp);
        inputs.push(inp);
    }

    return blok;
}

// 💾 KAYDET
window.kaydet = async function() {

    if (!adminMi) return;

    let data = {};
    let index = 0;

    // ☕
    for (let i = 1; i <= 4; i++) {
        let saat = inputs[index++].value;
        let kisiler = [];
        for (let j = 0; j < 6; j++) {
            kisiler.push(inputs[index++].value);
        }
        data["cay"+i] = { saat, kisiler };
    }

    // 🍽️
    for (let i = 1; i <= 4; i++) {
        let saat = inputs[index++].value;
        let kisiler = [];
        for (let j = 0; j < 6; j++) {
            kisiler.push(inputs[index++].value);
        }
        data["yemek"+i] = { saat, kisiler };
    }

    // 🕓
    for (let i = 1; i <= 4; i++) {
        let saat = inputs[index++].value;
        let kisiler = [];
        for (let j = 0; j < 6; j++) {
            kisiler.push(inputs[index++].value);
        }
        data["son"+i] = { saat, kisiler };
    }

    await setDoc(doc(db, "kasa", "mola"), {data});
    alert("Kaydedildi");
}

</script>

</body>
</html>
