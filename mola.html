<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mola Sistemi</title>

<style>
body {
    font-family: Arial;
    background:#1e1e2f;
    color:#ffffff;
    text-align:center;
}

.container { max-width:1200px; margin:auto; }

.baslik {
    margin-top:25px;
    font-size:20px;
    font-weight:bold;
    color:#FFD700;
}

.grid {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
}

.blok {
    background:#2a2a3d;
    padding:8px;
    border-radius:10px;
    border:1px solid #555;
}

.aktif {
    background:#8B0000 !important;
    box-shadow:0 0 15px red;
}

.bitti {
    background:#2e7d32 !important;
    box-shadow:0 0 15px lime;
}

input { margin:3px; }
.kisiInput { width:90%; }
.sureInput { width:50px; }

</style>
</head>

<body>

<div class="container">

<h2>☕ Mola Sistemi</h2>

<div id="alan"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"ukasa1.firebaseapp.com",
  projectId:"ukasa1"
});

const db = getFirestore(app);

let alan = document.getElementById("alan");
let state = {};

const ref = doc(db, "kasa", "mola");

onSnapshot(ref, (snap) => {

    state = snap.exists() ? snap.data().data : {};

    alan.innerHTML = "";

    alan.appendChild(grid("cay",4,"caySure"));
    alan.appendChild(grid("yemek",4,"yemekSure"));
    alan.appendChild(grid("son",4,"sonSure"));
});

function grid(prefix,adet,sureKey){
    let g = document.createElement("div");
    g.className="grid";

    for(let i=1;i<=adet;i++){
        g.appendChild(blok(prefix+i,sureKey));
    }

    return g;
}

function blok(key,sureKey){

    let b = document.createElement("div");
    b.className="blok";

    let saat = document.createElement("input");
    saat.type="time";
    saat.value = state[key]?.saat || "";

    b.appendChild(saat);

    for(let i=0;i<3;i++){
        let inp = document.createElement("input");
        inp.className="kisiInput";
        inp.value = state[key]?.kisiler?.[i] || "";
        b.appendChild(inp);
    }

    let sayac=document.createElement("div");
    b.appendChild(sayac);

    setInterval(()=>{

        if(!saat.value) return;

        let dk = parseInt(state[sureKey]?.sure || 15);
        let sure = dk*60;

        let now = new Date();
        let [h,m]=saat.value.split(":");

        let hedef=new Date();
        hedef.setHours(h,m,0);

        /* 🔥 GECE FIX */
        if(hedef < now){
            hedef.setDate(hedef.getDate() + 1);
        }

        let fark=Math.floor((hedef-now)/1000);

        if(fark<=0 && fark>-sure){
            b.classList.add("aktif");
            b.classList.remove("bitti");

            let kalan=sure+fark;
            let d=Math.floor(kalan/60);
            let s=kalan%60;

            sayac.innerText=`Mola: ${d}dk ${s}sn`;
        }
        else if(fark<=-sure){
            b.classList.add("bitti");
            b.classList.remove("aktif");

            sayac.innerText="Mola bitti";
        }
        else{
            b.classList.remove("aktif","bitti");
            sayac.innerText="";
        }

    },1000);

    return b;
}

/* 🔥 MOLADA MI (GECE FIX EKLİ) */
function moladaMi(saatStr,sure){

    if(!saatStr) return false;

    let now = new Date();
    let [h,m] = saatStr.split(":");

    let hedef = new Date();
    hedef.setHours(h,m,0);

    /* 🔥 GECE FIX */
    if(hedef < now){
        hedef.setDate(hedef.getDate() + 1);
    }

    let fark = Math.floor((hedef-now)/1000);

    return (fark<=0 && fark>-sure);
}

</script>

</body>
</html>
