<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mola Sistemi</title>

<style>
body {
    font-family: Arial;
    background:#1e1e2f;
    color:#ffffff;
    text-align:center;
}

.container { max-width:1200px; margin:auto; }

.baslik {
    margin-top:25px;
    font-size:20px;
    font-weight:bold;
    color:#FFD700;
}

/* 🔥 GRID DÜZELTME */
.grid {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
    justify-content:center;
    margin-bottom:10px;
}

/* 🔥 BLOKLAR KÜÇÜLDÜ */
.blok {
    background:#2a2a3d;
    padding:8px;
    border-radius:10px;
    border:1px solid #555;
    min-width:0;
}

h4 {
    margin:5px 0;
    font-weight:bold;
    color:#00ffff;
    font-size:14px;
}

input {
    padding:5px;
    margin:2px;
    border-radius:6px;
    border:none;
    font-size:11px;
    font-weight:bold;
}

.kisiInput { width:90%; }
.sureInput { width:50px; }

button {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#4CAF50;
    color:white;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>☕ Mola Sistemi</h2>

<button onclick="window.location.href='index.html'">⬅️ Kasa</button>

<div id="alan"></div>

<button id="kaydetBtn" onclick="kaydet()" style="display:none;">Kaydet</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let kullanici = localStorage.getItem("kullanici");
let adminMi = (kullanici === "admin");

let alan = document.getElementById("alan");
let state = {};

const ref = doc(db, "kasa", "mola");

onSnapshot(ref, (snap) => {

    state = snap.exists() ? snap.data().data : {};

    alan.innerHTML = "";

    alan.appendChild(baslik("caySure","☕ Çay Molası"));
    alan.appendChild(grid("cay",4,"caySure"));

    alan.appendChild(baslik("yemekSure","🍽️ Yemek Molası"));
    alan.appendChild(grid("yemek",4,"yemekSure"));

    alan.appendChild(baslik("sonSure","🕓 Son Mola"));
    alan.appendChild(grid("son",4,"sonSure"));

    if (adminMi) {
        document.getElementById("kaydetBtn").style.display = "block";
    }
});

function baslik(key,text){

    let d = document.createElement("div");
    d.className = "baslik";

    let span = document.createElement("span");
    span.innerText = text;
    d.appendChild(span);

    let inp = document.createElement("input");
    inp.type="number";
    inp.className="sureInput";
    inp.value = state[key]?.sure || "";

    if(!adminMi) inp.disabled=true;

    inp.oninput = () => {
        state[key] = { sure: inp.value };
    }

    d.appendChild(inp);

    return d;
}

function grid(prefix,adet,sureKey){

    let g = document.createElement("div");
    g.className="grid";

    for(let i=1;i<=adet;i++){
        g.appendChild(blok(prefix+i,sureKey));
    }

    return g;
}

function blok(key,sureKey){

    let b = document.createElement("div");
    b.className="blok";

    let t = document.createElement("h4");
    t.innerText=key;
    b.appendChild(t);

    let saat = document.createElement("input");
    saat.type="time";
    saat.value = state[key]?.saat || "";

    if(!adminMi) saat.disabled=true;

    saat.oninput = () => {
        state[key] = state[key] || {};
        state[key].saat = saat.value;
    }

    b.appendChild(saat);

    let kisiler=[];

    for(let i=0;i<6;i++){

        let inp = document.createElement("input");
        inp.className="kisiInput";
        inp.value = state[key]?.kisiler?.[i] || "";

        if(!adminMi) inp.disabled=true;

        inp.oninput = () => {
            state[key] = state[key] || {};
            state[key].kisiler = state[key].kisiler || [];
            state[key].kisiler[i] = inp.value;
        }

        b.appendChild(inp);
        kisiler.push(inp);
    }

    let sayac=document.createElement("div");
    b.appendChild(sayac);

    setInterval(()=>{

        if(!saat.value) return;

        let aktif = (localStorage.getItem("kullanici")||"").toLowerCase();
        let grup = kisiler.map(k=>k.value.toLowerCase());

        let dk = parseInt(state[sureKey]?.sure || 15);
        let sure = dk*60;

        let now = new Date();
        let [h,m]=saat.value.split(":");

        let hedef=new Date();
        hedef.setHours(h,m,0);

        let fark=Math.floor((hedef-now)/1000);

        let benim = grup.includes(aktif);

        if(fark<=0 && fark>-sure){

            b.style.background="#8B0000";

            let kalan=sure+fark;
            let d=Math.floor(kalan/60);
            let s=kalan%60;

            sayac.innerText=`Mola: ${d}dk ${s}sn`;

            if(!b.basladi){
                if(benim){
                    alert("Molan başladı!");
                    navigator.vibrate?.([300,200,300]);
                }
                b.basladi=true;
            }
        }
        else if(fark<=-sure){

            b.style.background="#2e7d32";
            sayac.innerText="Mola bitti";

            if(!b.bitti){
                if(benim){
                    alert("Molan bitti!");
                    navigator.vibrate?.([500,200,500]);
                }
                b.bitti=true;
            }
        }
        else{
            b.style.background="#2a2a3d";
            sayac.innerText="";
            b.basladi=false;
            b.bitti=false;
        }

    },1000);

    return b;
}

window.kaydet = async function(){
    if(!adminMi) return;
    await setDoc(doc(db,"kasa","mola"),{data:state});
    alert("Kaydedildi");
}

</script>

</body>
</html>
