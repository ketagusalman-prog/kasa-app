<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mola Sistemi</title>

<style>
body {
    margin:0;
    background:linear-gradient(135deg,#0f172a,#020617);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:"Segoe UI";
}

.phone {
    width:390px;
    height:800px;
    background:black;
    border-radius:35px;
    padding:10px;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
}

.app {
    width:100%;
    height:100%;
    background:#020617;
    border-radius:25px;
    overflow-y:auto;
    color:white;
    padding:15px;
}

.topbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.baslik {
    margin-top:15px;
    font-size:16px;
    font-weight:bold;
    color:#FFD700;
    display:flex;
    justify-content:space-between;
}

.grid {
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:8px;
}

.blok {
    background:#1e293b;
    padding:8px;
    border-radius:12px;
}

.aktif {
    background:#8B0000 !important;
}

.bitti {
    background:#166534 !important;
}

input { padding:6px; margin:3px; border-radius:8px; border:none; }
input:disabled { background:#444; color:#fff; }

button {
    padding:10px;
    margin:5px;
    border-radius:10px;
    border:none;
    background:#4CAF50;
    color:white;
    width:100%;
}

.altBtn { display:flex; gap:5px; }
.altBtn button { flex:1; }

.buyukSayac {
    position:fixed;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    width:300px;
    text-align:center;
    font-size:24px;
    padding:10px;
    background:black;
    color:#22c55e;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="phone">
<div class="app">

<div class="topbar">
<h3>☕ Mola</h3>
</div>

<div id="alan"></div>

<div class="altBtn">
<button id="kaydetBtn" onclick="kaydet()">Kaydet</button>
<button id="kaydirBtn" onclick="kaydir()">Kaydır</button>
<button id="baslatBtn" onclick="baslat()">▶️</button>
<button id="durdurBtn" onclick="durdur()">⏸</button>
</div>

</div>
</div>

<div id="buyukSayac" class="buyukSayac">--:--</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let kullanici = (localStorage.getItem("kullanici") || "").toLowerCase();
let adminMi = (kullanici === "admin");

let sistemAktif = true;

let alan = document.getElementById("alan");
let state = {};

const ref = doc(db, "kasa", "mola");

onSnapshot(ref, (snap) => {

    let data = snap.data() || {};

    state = data.data || {};
    sistemAktif = data.aktif ?? true;

    alan.innerHTML = "";

    alan.appendChild(grid("cay",4,"caySure"));
    alan.appendChild(grid("yemek",4,"yemekSure"));
    alan.appendChild(grid("son",4,"sonSure"));
});

function grid(prefix,adet,sureKey){
    let g = document.createElement("div");
    g.className="grid";

    for(let i=1;i<=adet;i++){
        g.appendChild(blok(prefix+i,sureKey));
    }
    return g;
}

function blok(key,sureKey){

    let b = document.createElement("div");
    b.className="blok";

    let saat = document.createElement("input");
    saat.type="time";
    saat.value = state[key]?.saat || "";
    b.appendChild(saat);

    let sayac=document.createElement("div");
    b.appendChild(sayac);

    setInterval(()=>{

        if(!sistemAktif){
            b.classList.remove("aktif","bitti");
            sayac.innerText="";
            return;
        }

        if(!saat.value) return;

        let dk = 15;
        let sure = dk*60;

        let now = new Date();
        let [h,m]=saat.value.split(":");

        let hedef=new Date();
        hedef.setHours(h,m,0);

        let fark=Math.floor((hedef-now)/1000);

        if(fark<=0 && fark>-sure){
            b.classList.add("aktif");
            let kalan=sure+fark;
            let d=Math.floor(kalan/60);
            let s=kalan%60;
            sayac.innerText=`Mola: ${d}dk ${s}sn`;
        }

    },1000);

    return b;
}

/* BÜYÜK SAYAÇ */
setInterval(()=>{
    if(!sistemAktif){
        buyukSayac.innerText="DURDU";
        return;
    }

    let aktif = document.querySelector(".aktif div");
    if(!aktif) return;

    buyukSayac.innerText = aktif.innerText;

},500);

/* BAŞLAT DURDUR */
window.baslat = async ()=>{
    await setDoc(ref,{data:state,aktif:true});
}

window.durdur = async ()=>{
    await setDoc(ref,{data:state,aktif:false});
}

</script>

</body>
</html>
