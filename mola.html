<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mola Sistemi</title>

<style>
body {
    font-family: Arial;
    background:#1e1e2f;
    color:#ffffff;
    text-align:center;
}

.container { max-width:1200px; margin:auto; }

.baslik {
    margin-top:25px;
    font-size:20px;
    font-weight:bold;
    color:#FFD700;
}

.grid {
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
}

.blok {
    background:#2a2a3d;
    padding:8px;
    border-radius:10px;
    border:1px solid #555;
    position:relative;
}

.aktif {
    background:#8B0000 !important;
    box-shadow:0 0 15px red, 0 0 25px red;
}

.bitti {
    background:#2e7d32 !important;
    box-shadow:0 0 15px lime, 0 0 25px lime;
}

h4 {
    margin:5px 0;
    font-weight:bold;
    color:#00ffff;
    font-size:14px;
}

input {
    padding:6px;
    margin:3px;
    border-radius:6px;
    border:none;
    font-size:12px;
    font-weight:bold;
    background:#ffffff;
    color:#000000;
}

input:disabled {
    background:#dddddd;
    color:#000000;
    opacity:1;
}

.kisiInput { width:90%; }
.sureInput { width:50px; }

button {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    background:#4CAF50;
    color:white;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>☕ Mola Sistemi</h2>

<button onclick="window.location.href='index.html'">⬅️ Kasa</button>

<!-- 🔥 EKLENEN BUTON -->
<button onclick="window.location.href='kisisel.html'">
👤 Kişisel Panel
</button>

<div id="alan"></div>

<button id="kaydetBtn" onclick="kaydet()" style="display:none;">Kaydet</button>
<button id="kaydirBtn" onclick="kaydir()" style="display:none;">⬅️➡️ Kaydır</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "ukasa1.firebaseapp.com",
  projectId: "ukasa1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let kullanici = (localStorage.getItem("kullanici") || "").toLowerCase().trim();
let adminMi = (kullanici === "admin");

document.getElementById("kaydetBtn").style.display = adminMi ? "block" : "none";
document.getElementById("kaydirBtn").style.display = adminMi ? "block" : "none";

let alan = document.getElementById("alan");
let state = {};

const ref = doc(db, "kasa", "mola");

onSnapshot(ref, (snap) => {

    state = snap.exists() ? snap.data().data : {};

    alan.innerHTML = "";

    alan.appendChild(baslik("caySure","☕ Çay Molası"));
    alan.appendChild(grid("cay",4,"caySure"));

    alan.appendChild(baslik("yemekSure","🍽️ Yemek Molası"));
    alan.appendChild(grid("yemek",4,"yemekSure"));

    alan.appendChild(baslik("sonSure","🕓 Son Mola"));
    alan.appendChild(grid("son",4,"sonSure"));
});

function baslik(key,text){

    let d = document.createElement("div");
    d.className = "baslik";

    let span = document.createElement("span");
    span.innerText = text;
    d.appendChild(span);

    let inp = document.createElement("input");
    inp.type="number";
    inp.className="sureInput";
    inp.value = state[key]?.sure || "";

    inp.disabled = !adminMi;

    inp.oninput = () => {
        if(!adminMi) return;
        state[key] = { sure: inp.value };
    }

    d.appendChild(inp);

    return d;
}

function grid(prefix,adet,sureKey){
    let g = document.createElement("div");
    g.className="grid";

    for(let i=1;i<=adet;i++){
        g.appendChild(blok(prefix+i,sureKey));
    }

    return g;
}

function blok(key,sureKey){

    let b = document.createElement("div");
    b.className="blok";

    let t = document.createElement("h4");
    t.innerText=key;
    b.appendChild(t);

    let saat = document.createElement("input");
    saat.type="time";
    saat.value = state[key]?.saat || "";
    saat.disabled = !adminMi;

    saat.oninput = () => {
        if(!adminMi) return;
        state[key] = state[key] || {};
        state[key].saat = saat.value;
    }

    b.appendChild(saat);

    let kisiler=[];

    for(let i=0;i<6;i++){
        let inp = document.createElement("input");
        inp.className="kisiInput";
        inp.value = state[key]?.kisiler?.[i] || "";
        inp.disabled = !adminMi;

        inp.oninput = () => {
            if(!adminMi) return;
            state[key] = state[key] || {};
            state[key].kisiler = state[key].kisiler || [];
            state[key].kisiler[i] = inp.value;
        }

        b.appendChild(inp);
        kisiler.push(inp);
    }

    let sayac=document.createElement("div");
    b.appendChild(sayac);

    setInterval(()=>{

        if(!saat.value) return;

        let dk = parseInt(state[sureKey]?.sure || 15);
        let sure = dk*60;

        let now = new Date();
        let [h,m]=saat.value.split(":");

        let hedef=new Date();
        hedef.setHours(h,m,0);

        let fark=Math.floor((hedef-now)/1000);

        if(fark > 43200){
            hedef.setDate(hedef.getDate()-1);
            fark = Math.floor((hedef-now)/1000);
        }

        if(fark<=0 && fark>-sure){
            b.classList.add("aktif");
            b.classList.remove("bitti");

            let kalan=sure+fark;
            let d=Math.floor(kalan/60);
            let s=kalan%60;

            sayac.innerText=`Mola: ${d}dk ${s}sn`;
        }
        else if(fark<=-sure){
            b.classList.add("bitti");
            b.classList.remove("aktif");

            sayac.innerText="Mola bitti";
        }
        else{
            b.classList.remove("aktif","bitti");
            sayac.innerText="";
        }

    },1000);

    return b;
}

window.kaydir = function(){

    if(!adminMi){
        alert("Sadece admin kullanabilir!");
        return;
    }

    ["cay","yemek","son"].forEach(grup=>{

        let kisilerList = [
            state[grup+"1"]?.kisiler || [],
            state[grup+"2"]?.kisiler || [],
            state[grup+"3"]?.kisiler || []
        ];

        let son = kisilerList.pop();
        kisilerList.unshift(son);

        for(let i=1;i<=3;i++){
            state[grup+i] = state[grup+i] || {};
            state[grup+i].kisiler = kisilerList[i-1];
        }
    });

    alan.innerHTML = "";

    alan.appendChild(baslik("caySure","☕ Çay Molası"));
    alan.appendChild(grid("cay",4,"caySure"));

    alan.appendChild(baslik("yemekSure","🍽️ Yemek Molası"));
    alan.appendChild(grid("yemek",4,"yemekSure"));

    alan.appendChild(baslik("sonSure","🕓 Son Mola"));
    alan.appendChild(grid("son",4,"sonSure"));
}

window.kaydet = async function(){

    if(!adminMi){
        alert("Sadece admin kaydedebilir!");
        return;
    }

    await setDoc(doc(db,"kasa","mola"),{data:state});
    alert("Kaydedildi");
}

</script>

</body>
</html>
